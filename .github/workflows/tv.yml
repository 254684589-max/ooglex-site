name: TV Channels

# 生成「环球TV」频道库：抓取 iptv-org 公开数据（channels + streams）中的 HTTPS 直播源，
# 并发探活后只收录能连上的源（每台最多 1 主源 + 2 备用源）→ 写 apps/tv/channels.json。
# 网页只读同源的 channels.json，避免国内（尤其手机/微信）直连外网 API 不稳。数据源免登录、无需密钥。
on:
  workflow_dispatch:
  schedule:
    - cron: '45 4 * * 1,4'   # 每周一、周四 04:45 UTC 刷新（勤刷可及时清掉刚死的源）

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # 存活探测要请求上万个源，给足并发探测时间
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build TV channels
        run: python scripts/tv/build_tv.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/tv/channels.json
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
            exit 0
          fi
          git commit -m "data: refresh tv channels"
          # 数据文件由本工作流独占生成。推送遇远端新提交时 rebase 重试，冲突以本次生成的版本为准。
          for i in 1 2 3 4 5; do
            if git push origin "HEAD:$GITHUB_REF_NAME"; then
              echo "已推送"; exit 0
            fi
            echo "推送被拒，拉取远端后重试（$i）"
            git fetch origin "$GITHUB_REF_NAME" || true
            git rebase -X theirs "origin/$GITHUB_REF_NAME" || git rebase --abort
            sleep $((i * 3))
          done
          echo "推送多次失败"; exit 1
