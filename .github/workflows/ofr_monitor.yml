name: OFR Monitor

# 每日刷新「美国金融风险监测」：跑取数脚本 → 生成 apps/ofr-monitor/data.json → 提交回仓库。
# 数据源为美国金融研究办公室（OFR）公开数据（金融压力指数 CSV + 短期融资监测 STFM API），无需密钥。
on:
  # 定点 cron 会被 GitHub 推迟数小时，改由 scheduler.yml 每日在 21:00 UTC 窗口开启后统一触发。
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests

      - name: Build OFR monitor data
        run: python scripts/ofr-monitor/build_ofr.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/ofr-monitor/data.json
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
            exit 0
          fi
          git commit -m "data: refresh OFR financial risk monitor"
          # 数据文件由本工作流独占生成。推送遇远端新提交时 rebase 重试，冲突以本次生成的版本为准
          # （rebase 中 ours/theirs 语义互换，-X theirs 才是本地工作分支一侧）。
          for i in 1 2 3 4 5; do
            if git push origin "HEAD:$GITHUB_REF_NAME"; then
              echo "已推送"; exit 0
            fi
            echo "推送被拒，拉取远端后重试（$i）"
            git fetch origin "$GITHUB_REF_NAME" || true
            git rebase -X theirs "origin/$GITHUB_REF_NAME" || git rebase --abort
            sleep $((i * 3))
          done
          echo "推送多次失败"; exit 1
