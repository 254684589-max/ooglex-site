name: University Rankings

# 每日刷新「全球大学排名 300 强」：跑取数脚本 → 生成 apps/university-rankings/data.json → 提交回仓库。
# 数据源 QS / THE / ARWU（软科） / U.S. News 四大公开榜单，均免密钥。
# 有效源过少时脚本会保留上次 data.json（首次运行则用内置 SEED 上线快照），绝不用空/脏数据覆盖。
on:
  # 定点 cron 会被 GitHub 推迟数小时，改由 scheduler.yml 每日在 21:00 UTC 窗口开启后统一触发。
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build university rankings data
        run: python scripts/university-rankings/build_universities.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- apps/university-rankings/data.json; then
            echo "data.json 无变化，跳过提交"
            exit 0
          fi
          git add apps/university-rankings/data.json
          git commit -m "data: refresh global university rankings"
          # data.json 由本工作流独占生成。推送遇远端新提交时 rebase 重试，冲突以本次生成的版本为准
          # （rebase 中 ours/theirs 语义互换，-X theirs 才是本地工作分支一侧）；不用
          # `git pull --rebase --autostash`，避免弹栈冲突把 <<<<<<< 标记写进 JSON。
          for i in 1 2 3 4 5; do
            git push origin HEAD:${GITHUB_REF_NAME} && { echo "推送成功"; exit 0; }
            echo "推送失败，第 $i 次重试前先 rebase 远端最新提交…"
            git fetch origin ${GITHUB_REF_NAME}
            git rebase -X theirs origin/${GITHUB_REF_NAME} || git rebase --abort
            sleep $((i * i))
          done
          echo "多次推送失败" >&2
          exit 1
