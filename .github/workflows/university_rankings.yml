name: University Rankings

# 「全球大学排名 300 强」取数脚本 → 生成 apps/university-rankings/data.json → 提交回仓库。
# 说明：QS / THE / ARWU / U.S. News 四大排名官网均封锁自动抓取（实测 403 / 超时 / JS 渲染），
# 因此本站该榜采用「年度权威数据整理」（四榜近一期公开位次的整理），不进入每日调度。
# 本工作流仅保留手动触发：若日后官网接口对机房可达，脚本会自动改用实时数据；否则保留整理数据不覆盖。
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build university rankings data
        run: python scripts/university-rankings/build_universities.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- apps/university-rankings/data.json; then
            echo "data.json 无变化，跳过提交"
            exit 0
          fi
          git add apps/university-rankings/data.json
          git commit -m "data: refresh global university rankings"
          # data.json 由本工作流独占生成。推送遇远端新提交时 rebase 重试，冲突以本次生成的版本为准
          # （rebase 中 ours/theirs 语义互换，-X theirs 才是本地工作分支一侧）；不用
          # `git pull --rebase --autostash`，避免弹栈冲突把 <<<<<<< 标记写进 JSON。
          for i in 1 2 3 4 5; do
            git push origin HEAD:${GITHUB_REF_NAME} && { echo "推送成功"; exit 0; }
            echo "推送失败，第 $i 次重试前先 rebase 远端最新提交…"
            git fetch origin ${GITHUB_REF_NAME}
            git rebase -X theirs origin/${GITHUB_REF_NAME} || git rebase --abort
            sleep $((i * i))
          done
          echo "多次推送失败" >&2
          exit 1
