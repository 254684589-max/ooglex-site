name: Asset Tracker

# 每日刷新「全球大类资产收益率」数据：跑取数脚本 → 生成 apps/asset-tracker/data.json → 提交回仓库。
# GitHub Pages 直接托管该 JSON，页面前端读取即时渲染。不需要任何密钥（数据源 Yahoo Finance）。
on:
  workflow_dispatch:
  schedule:
    # 每天 22:30 UTC（≈ 北京时间次日 06:30，美股收盘后）刷新一次
    - cron: '30 22 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests

      - name: Build asset data
        run: python scripts/asset-tracker/build_assets.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/asset-tracker/data.json
          git diff --cached --quiet || (git commit -m "data: refresh global asset returns" && git push)
