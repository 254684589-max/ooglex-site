name: AI Rankings Probe

# 临时调试工作流：探测 LMArena / LiveBench 的真实数据结构（打印到日志），修好解析器后即删除。
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe leaderboard sources
        run: |
          python3 - <<'EOF'
          import re, json, urllib.request
          UA = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36'}
          def get(u):
              try:
                  r = urllib.request.urlopen(urllib.request.Request(u, headers=UA), timeout=30)
                  b = r.read()
                  print('GET', u, '->', getattr(r, 'status', '?'), len(b), 'bytes')
                  return b.decode('utf-8', 'replace')
              except Exception as e:
                  print('GET', u, '-> ERR', e)
                  return ''

          print('===== LMArena 新解析器验证 =====')
          h = get('https://lmarena.ai/leaderboard/text')
          u = h.replace('\\\\"', '"').replace('\\"', '"')
          rows = {}
          for blk in re.findall(r'\{[^{}]+\}', u):
              if '"rating":' not in blk or '"modelDisplayName":' not in blk:
                  continue
              try:
                  o = json.loads(blk)
              except Exception:
                  continue
              name = o.get('modelDisplayName')
              r = o.get('rating')
              if not name or not isinstance(r, (int, float)) or not (800 <= r <= 2000):
                  continue
              if name not in rows or r > rows[name]['rating']:
                  rows[name] = o
          print('解析出模型数：', len(rows))
          top = sorted(rows.values(), key=lambda o: -o['rating'])[:15]
          for o in top:
              print(' ', o.get('modelDisplayName'), round(o['rating'], 1), o.get('modelOrganization'),
                    o.get('license'), 'ctx=', o.get('contextLength'),
                    'in=', o.get('inputPricePerMillion'), 'out=', o.get('outputPricePerMillion'),
                    'votes=', o.get('votes'))

          print('===== LiveBench bundle 深挖 =====')
          lb = get('https://livebench.ai/')
          m = re.search(r'src="(\./static/js/[^"]+\.js)"', lb)
          js = 'https://livebench.ai/' + m.group(1).lstrip('./') if m else ''
          t = get(js)
          print('url 字面量：', sorted(set(re.findall(r'https?://[A-Za-z0-9_\-./%?=&]+', t)))[:60])
          for tok in ('average', 'Average', 'score', '.csv', 'csv', 'fetch(', 'datasets', 'results', 'api.'):
              c = t.count(tok)
              print('token', tok, ':', c)
          for tok in ('.csv', 'fetch(', 'datasets/'):
              j = 0
              for _ in range(3):
                  j = t.find(tok, j + 1)
                  if j < 0:
                      break
                  print('ctx', tok, ':', repr(t[max(0, j-220):j+260]))
          EOF
