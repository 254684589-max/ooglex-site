name: Superinvestors & AAII Tracker

# 每周刷新「超级投资者持仓 + AAII 情绪调查」：跑取数脚本 → 生成
# apps/superinvestors/data.json → 提交回仓库。
# 数据源：SEC EDGAR 13F（无需密钥）+ AAII 情绪调查（周四发布，故周五早上抓）。
on:
  workflow_dispatch:
  schedule:
    # 每周五 00:40 UTC（≈ 北京周五 08:40；AAII 周四发布后、与每日任务错开）
    - cron: '40 0 * * 5'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests xlrd

      - name: Build superinvestors data
        env:
          # 国会议员交易数据（FMP 免费 Key）：仓库 Settings → Secrets → FMP_API_KEY
          # 未配置时该节跳过并保留上次数据，其余板块不受影响
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python scripts/superinvestors/build_superinvestors.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/superinvestors/data.json
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
            exit 0
          fi
          git commit -m "data: refresh superinvestors + aaii sentiment"
          # 数据文件由本工作流独占生成。推送遇远端新提交时 rebase 重试，冲突以本次生成的版本为准
          # （rebase 中 ours/theirs 语义互换，-X theirs 才是本地工作分支一侧）；不用
          # `git pull --rebase --autostash`，避免弹栈冲突把 <<<<<<< 标记写进 JSON。
          for i in 1 2 3 4 5; do
            if git push origin "HEAD:$GITHUB_REF_NAME"; then
              echo "已推送"; exit 0
            fi
            echo "推送被拒，拉取远端后重试（$i）"
            git fetch origin "$GITHUB_REF_NAME" || true
            git rebase -X theirs "origin/$GITHUB_REF_NAME" || git rebase --abort
            sleep $((i * 3))
          done
          echo "推送多次失败"; exit 1
