name: Macro Radar

# 每日刷新「宏观雷达 · Macro Radar」：跑取数脚本（Yahoo 行情 + FRED 免登录 CSV）→
# 生成 apps/macro-radar/data.json → 提交回仓库。均无需 API Key。
# 数据源全挂时脚本会保留上次 data.json 不覆盖。
on:
  workflow_dispatch:
  schedule:
    # 每天 22:20 UTC（≈ 北京次日 06:20；美股收盘后、FRED 日更后，与其它每日工作流错开）
    - cron: '20 22 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests

      - name: Build macro radar data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}   # 可选：有则接入 FRED 宏观管道
        run: python scripts/macro-radar/build_radar.py

      - name: Build regime history (时光机)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/macro-radar/build_history.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add apps/macro-radar/data.json
          [ -f apps/macro-radar/history.json ] && git add apps/macro-radar/history.json || true
          git diff --cached --quiet || (git commit -m "data: refresh macro radar" && git push)
