name: Asset Ranking

# 每日刷新「全球资产市值排行榜（前 250，不限品类）」→ 生成 apps/asset-ranking/data.json → 提交回仓库。
# 商品/贵金属/汇率取 Yahoo Finance，加密货币取 CoinGecko，公司复用 apps/companies/data.json，均免密钥。
# 排在 companies 工作流（23:10 UTC）之后运行，以复用当日最新的公司市值。
on:
  workflow_dispatch:
  schedule:
    - cron: '40 23 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests

      - name: Build asset ranking
        run: python scripts/asset-ranking/build_ranking.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/asset-ranking/data.json
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
            exit 0
          fi
          git commit -m "data: refresh global asset ranking"
          # 数据文件由本工作流独占生成。推送遇远端新提交时 rebase 重试，冲突以本次生成的版本为准
          # （rebase 中 ours/theirs 语义互换，-X theirs 才是本地工作分支一侧）；不用
          # `git pull --rebase --autostash`，避免弹栈冲突把 <<<<<<< 标记写进 JSON。
          for i in 1 2 3 4 5; do
            if git push origin "HEAD:$GITHUB_REF_NAME"; then
              echo "已推送"; exit 0
            fi
            echo "推送被拒，拉取远端后重试（$i）"
            git fetch origin "$GITHUB_REF_NAME" || true
            git rebase -X theirs "origin/$GITHUB_REF_NAME" || git rebase --abort
            sleep $((i * 3))
          done
          echo "推送多次失败"; exit 1
