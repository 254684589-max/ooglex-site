name: World Economy Map

# 每日刷新「全球经济图谱」：抓世界银行多项宏观指标 + 整理的央行利率 → 写 apps/world-economy/data.json。
# 数据源 World Bank Open Data，免登录、无需密钥。
on:
  # 定点 cron 会被 GitHub 推迟数小时，改由 scheduler.yml 每日在 21:00 UTC 窗口开启后统一触发。
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests

      - name: Build economy data
        run: python scripts/world-economy/build_economy.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/world-economy/data.json
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
            exit 0
          fi
          git commit -m "data: refresh world economy indicators"
          # 数据文件由本工作流独占生成。推送遇远端新提交时 rebase 重试，冲突以本次生成的版本为准
          # （rebase 中 ours/theirs 语义互换，-X theirs 才是本地工作分支一侧）；不用
          # `git pull --rebase --autostash`，避免弹栈冲突把 <<<<<<< 标记写进 JSON。
          for i in 1 2 3 4 5; do
            if git push origin "HEAD:$GITHUB_REF_NAME"; then
              echo "已推送"; exit 0
            fi
            echo "推送被拒，拉取远端后重试（$i）"
            git fetch origin "$GITHUB_REF_NAME" || true
            git rebase -X theirs "origin/$GITHUB_REF_NAME" || git rebase --abort
            sleep $((i * 3))
          done
          echo "推送多次失败"; exit 1
