name: World Economy Map

# 每日刷新「全球经济图谱」：抓世界银行多项宏观指标 + 整理的央行利率 → 写 apps/world-economy/data.json。
# 数据源 World Bank Open Data，免登录、无需密钥。
on:
  workflow_dispatch:
  schedule:
    - cron: '40 23 * * *'   # 每天 23:40 UTC（与其它每日工作流错开）

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests

      - name: Build economy data
        run: python scripts/world-economy/build_economy.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add apps/world-economy/data.json
          git diff --cached --quiet || (git commit -m "data: refresh world economy indicators" && git push)
