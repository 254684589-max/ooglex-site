name: Econ Calendar

# 刷新「全球经济日历」：抓 Forex Factory 公开周历 → 写 apps/econ-calendar/data.json。
# 数据源免登录、无需密钥。每天跑两次，以便事件公布后回填实际值。
on:
  workflow_dispatch:
  schedule:
    - cron: '30 0,12 * * *'   # 每天 00:30 与 12:30 UTC（与其它工作流错开）

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests

      - name: Build econ calendar data
        run: python scripts/econ-calendar/build_calendar.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add apps/econ-calendar/data.json
          git diff --cached --quiet || (git commit -m "data: refresh econ calendar" && git push)
