name: Radio Stations

# 生成「环球电波」电台库：抓取 Radio Browser 全球 + 中国及周边 HTTPS 直连电台 → 写 apps/radio/stations.json。
# 网页只读同源的 stations.json，避免国内（尤其手机/微信）直连外网 API 不稳。数据源免登录、无需密钥。
on:
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * 1'   # 每周一 04:30 UTC 刷新一次

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build radio stations
        run: python scripts/radio/build_radio.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add apps/radio/stations.json
          git diff --cached --quiet || (git commit -m "data: refresh radio stations" && git push)
