name: Radio Stations

# 生成「环球电波」电台库：抓取 Radio Browser 全球 + 中国及周边 HTTPS 直连电台 → 写 apps/radio/stations.json。
# 网页只读同源的 stations.json，避免国内（尤其手机/微信）直连外网 API 不稳。数据源免登录、无需密钥。
on:
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * 1'   # 每周一 04:30 UTC 刷新一次

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build radio stations
        run: python scripts/radio/build_radio.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/radio/stations.json
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
            exit 0
          fi
          git commit -m "data: refresh radio stations"
          # 数据文件由本工作流独占生成。推送遇远端新提交时 rebase 重试，冲突以本次生成的版本为准
          # （rebase 中 ours/theirs 语义互换，-X theirs 才是本地工作分支一侧）；不用
          # `git pull --rebase --autostash`，避免弹栈冲突把 <<<<<<< 标记写进 JSON。
          for i in 1 2 3 4 5; do
            if git push origin "HEAD:$GITHUB_REF_NAME"; then
              echo "已推送"; exit 0
            fi
            echo "推送被拒，拉取远端后重试（$i）"
            git fetch origin "$GITHUB_REF_NAME" || true
            git rebase -X theirs "origin/$GITHUB_REF_NAME" || git rebase --abort
            sleep $((i * 3))
          done
          echo "推送多次失败"; exit 1
