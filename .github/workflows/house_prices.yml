name: House Prices

# 每日刷新「全球主要国家房价走势」→ 生成 apps/house-prices/data.json → 提交回仓库。
# 数据源 OECD 分析性房价指数 + BIS 住宅物业价格长序列（SDMX-JSON，免密钥，机房可达）。
on:
  workflow_dispatch:
  schedule:
    # 每周一 05:20 UTC 刷新一次（房价为季度数据，每周运行足以接住各国最新已发布季度）
    - cron: '20 5 * * 1'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests

      - name: Build house prices data
        run: python scripts/house-prices/build_house_prices.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/house-prices/data.json
          git diff --cached --quiet || (git commit -m "data: refresh global house prices" && git push)
