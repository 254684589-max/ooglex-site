name: Probe Embed Headers

# 临时调试工作流：检测红警网页版各站点是否允许 iframe 嵌入（X-Frame-Options / CSP frame-ancestors），用后即删。
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Check frame headers
        run: |
          for u in https://www.ra2web.com/ https://game.ra2web.com/ https://www.gongheguozhihui.com/ https://ra2.heheda.top/; do
            echo "===== $u ====="
            curl -sSIL --max-time 20 -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/126.0" "$u" 2>&1 \
              | grep -iE "HTTP/|x-frame-options|content-security-policy|location:" || echo "(无相关头或请求失败)"
          done
