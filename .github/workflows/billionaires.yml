name: Billionaires Tracker

# 每日刷新「全球前 60 富豪身价」：跑取数脚本 → 生成 apps/billionaires/data.json → 提交回仓库。
# GitHub Pages 直接托管该 JSON，页面前端读取即时渲染。数据源 Forbes 实时富豪榜，无需任何密钥。
on:
  # 定点 cron 会被 GitHub 推迟数小时，改由 scheduler.yml 每日在 21:00 UTC 窗口开启后统一触发。
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests

      - name: Build billionaires data
        run: python scripts/billionaires/build_billionaires.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- apps/billionaires/data.json; then
            echo "data.json 无变化，跳过提交"
            exit 0
          fi
          git add apps/billionaires/data.json
          git commit -m "data: refresh top billionaires"
          # data.json 由本工作流独占生成。推送遇远端新提交时，rebase 始终以本次生成的版本为准（rebase 中 ours/theirs 语义互换，-X theirs 才是本地工作分支一侧），
          # 避免旧写法 `git pull --rebase --autostash` 在弹栈冲突时把 <<<<<<< 标记写进 JSON（曾致前端解析失败）。
          for i in 1 2 3 4 5; do
            if git push origin "HEAD:$GITHUB_REF_NAME"; then
              echo "已推送"; exit 0
            fi
            echo "推送被拒，拉取远端后以本地版本为准重试（$i）"
            git fetch origin "$GITHUB_REF_NAME" || true
            git rebase -X theirs "origin/$GITHUB_REF_NAME" || git rebase --abort
            sleep $((i * 3))
          done
          echo "推送多次失败"; exit 1
