name: Fear & Greed Tracker

# 每日刷新「市场恐慌与贪婪指数」：跑取数脚本 → 生成 apps/fear-greed/data.json → 提交回仓库。
# 数据源 CNN 恐慌与贪婪指数，需带浏览器 UA，无需任何密钥。
on:
  workflow_dispatch:
  schedule:
    # 每天 23:10 UTC（≈ 北京次日 07:10；与 asset/billionaires 错开，避免提交撞车）
    - cron: '10 23 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests

      - name: Build fear & greed data
        run: python scripts/fear-greed/build_fear_greed.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add apps/fear-greed/data.json
          git diff --cached --quiet || (git commit -m "data: refresh fear & greed index" && git push)
