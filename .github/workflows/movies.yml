name: Movies

# 每日刷新「全球电影榜」：从 TMDB 公开 API 取高分电影 Top 250 与全球最新上映 → 写 apps/movies/data.json。
# 需在仓库 Settings → Secrets and variables → Actions 配置 TMDB_KEY（themoviedb.org 免费申请）。
# 未配置或取数失败时，脚本会保留上次 data.json、绝不用空数据覆盖。
on:
  workflow_dispatch:
  schedule:
    - cron: '20 0 * * *'   # 每天 00:20 UTC（与其它每日工作流错开）

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests

      - name: Build movies data
        env:
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
        run: python scripts/movies/build_movies.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/movies/data.json
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
            exit 0
          fi
          git commit -m "data: refresh movies"
          # 数据文件由本工作流独占生成。推送遇远端新提交时 rebase 重试，冲突以本次生成的版本为准
          # （rebase 中 ours/theirs 语义互换，-X theirs 才是本地工作分支一侧）；不用
          # `git pull --rebase --autostash`，避免弹栈冲突把 <<<<<<< 标记写进 JSON。
          for i in 1 2 3 4 5; do
            if git push origin "HEAD:$GITHUB_REF_NAME"; then
              echo "已推送"; exit 0
            fi
            echo "推送被拒，拉取远端后重试（$i）"
            git fetch origin "$GITHUB_REF_NAME" || true
            git rebase -X theirs "origin/$GITHUB_REF_NAME" || git rebase --abort
            sleep $((i * 3))
          done
          echo "推送多次失败"; exit 1
