name: Movies

# 每日刷新「全球电影榜」：从 TMDB 公开 API 取高分电影 Top 250 与全球最新上映 → 写 apps/movies/data.json。
# 需在仓库 Settings → Secrets and variables → Actions 配置 TMDB_KEY（themoviedb.org 免费申请）。
# 未配置或取数失败时，脚本会保留上次 data.json、绝不用空数据覆盖。
on:
  workflow_dispatch:
  schedule:
    - cron: '20 0 * * *'   # 每天 00:20 UTC（与其它每日工作流错开）

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests

      - name: Build movies data
        env:
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
        run: python scripts/movies/build_movies.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add apps/movies/data.json
          git diff --cached --quiet || (git commit -m "data: refresh movies" && git push)
