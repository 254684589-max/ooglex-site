<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{
    --felt1:#0f5d4a; --felt2:#0a3d33; --ink:#f3f6f4; --dim:#a9c3bb;
    --gold:#ffd45e; --red:#e7402e; --blk:#1d2430; --card:#fdfdfb;
    --accent:#ff5a3c; --accent2:#c0392b; --line:rgba(255,255,255,.12);
  }
  html,body{ height:100%; }
  body{ color:var(--ink); overflow:hidden; user-select:none;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
    background:radial-gradient(120% 80% at 50% 8%, #16785f 0%, var(--felt1) 38%, var(--felt2) 100%); }
  #app{ position:relative; width:100%; max-width:560px; height:100dvh; margin:0 auto; display:flex; flex-direction:column;
    box-shadow:0 0 80px rgba(0,0,0,.5); }

  /* ---- header ---- */
  header{ display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 12px;
    background:linear-gradient(180deg, rgba(0,0,0,.32), transparent); z-index:6; }
  header .back{ color:var(--gold); text-decoration:none; font-size:.82rem; font-weight:600; white-space:nowrap; }
  header .ttl{ font-weight:900; letter-spacing:1px; font-size:1.02rem; text-shadow:0 2px 6px rgba(0,0,0,.4); }
  header .ttl b{ color:var(--gold); }
  header .tools{ display:flex; gap:6px; }
  .ibtn{ width:34px; height:34px; border-radius:9px; border:1px solid var(--line); background:rgba(0,0,0,.25);
    color:var(--ink); font-size:1rem; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .ibtn.on{ background:var(--gold); color:#2a1d00; border-color:transparent; }

  #scorebar{ display:flex; justify-content:center; gap:14px; font-size:.74rem; color:var(--dim); padding:0 12px 2px; z-index:6; }
  #scorebar b{ color:var(--gold); }

  /* ---- table ---- */
  #table{ position:relative; flex:1; min-height:0; }
  .seat{ position:absolute; display:flex; flex-direction:column; align-items:center; gap:3px; z-index:4; }
  .seat .ava{ width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:1.7rem; background:radial-gradient(circle at 38% 32%, #2c3850, #161d2b); border:2px solid var(--line);
    box-shadow:0 4px 14px rgba(0,0,0,.4); position:relative; }
  .seat.turn .ava{ border-color:var(--gold); box-shadow:0 0 0 3px rgba(255,212,94,.35), 0 4px 14px rgba(0,0,0,.4); }
  .seat .nm{ font-size:.72rem; color:var(--dim); }
  .seat .cnt{ font-size:.7rem; color:var(--ink); background:rgba(0,0,0,.4); padding:1px 8px; border-radius:999px; }
  .crown{ position:absolute; top:-16px; left:50%; transform:translateX(-50%); font-size:1rem;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.5)); }
  .seatL{ left:10px; top:30px; } .seatR{ right:10px; top:30px; }
  .mini{ display:flex; height:30px; align-items:center; }
  .mini i{ display:block; width:9px; height:26px; border-radius:3px; margin-left:-6px;
    background:repeating-linear-gradient(45deg,#b23a2e 0 4px,#9c2f25 4px 8px); border:1px solid rgba(0,0,0,.3); }

  /* bubbles */
  .bubble{ min-height:0; font-size:.74rem; font-weight:700; padding:0; opacity:0; transition:opacity .2s; }
  .bubble.show{ opacity:1; padding:3px 10px; background:#fff; color:#222; border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,.3); }
  .bubble.rob{ background:var(--red); color:#fff; }
  .bubble.pass{ background:#444e5e; color:#fff; }

  /* played cards zone */
  .zone{ position:absolute; display:flex; justify-content:center; align-items:center; min-height:64px; z-index:3; }
  #zL{ left:74px; top:96px; } #zR{ right:74px; top:96px; }
  #zMe{ left:0; right:0; bottom:6px; }
  .zone .c{ margin-left:-26px; }
  #zBottom{ position:absolute; left:0; right:0; top:6px; display:flex; gap:5px; justify-content:center; align-items:center; z-index:4; }
  #zBottom .lbl{ font-size:.7rem; color:var(--gold); margin-right:4px; align-self:center; }

  #msg{ position:absolute; left:0; right:0; top:50%; transform:translateY(-50%); text-align:center; z-index:5;
    pointer-events:none; }
  #msg span{ display:inline-block; font-size:1.5rem; font-weight:900; padding:8px 22px; border-radius:14px;
    color:#fff; background:rgba(0,0,0,.55); box-shadow:0 6px 20px rgba(0,0,0,.45); animation:pop .35s ease; }
  @keyframes pop{ from{ transform:scale(.6); opacity:0 } to{ transform:scale(1); opacity:1 } }

  /* ---- card ---- */
  .c{ width:46px; height:64px; border-radius:7px; background:var(--card); position:relative; flex:none;
    box-shadow:0 2px 6px rgba(0,0,0,.35); border:1px solid rgba(0,0,0,.18); font-weight:800; }
  .c .r{ position:absolute; top:3px; left:4px; font-size:.82rem; line-height:1; }
  .c .s{ position:absolute; bottom:3px; right:4px; font-size:.86rem; line-height:1; }
  .c .big{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:1.25rem; opacity:.9; }
  .c.red{ color:var(--red); } .c.blk{ color:var(--blk); }
  .c.jok .big{ font-size:1.05rem; font-weight:900; }
  .c.small{ width:34px; height:48px; }
  .c.small .r{ font-size:.66rem; } .c.small .s{ font-size:.62rem; } .c.small .big{ font-size:.9rem; }

  /* ---- my hand ---- */
  #me{ position:relative; z-index:5; padding:2px 4px 8px; background:linear-gradient(0deg, rgba(0,0,0,.34), transparent); }
  #meInfo{ display:flex; align-items:center; justify-content:center; gap:8px; font-size:.74rem; color:var(--dim); margin-bottom:2px; }
  #meInfo .role{ color:var(--gold); font-weight:800; }
  #hand{ display:flex; justify-content:center; min-height:96px; padding-top:22px; overflow:visible; }
  #hand .c{ margin-left:-24px; cursor:pointer; transition:transform .12s; }
  #hand .c:first-child{ margin-left:0; }
  #hand .c.sel{ transform:translateY(-18px); box-shadow:0 6px 14px rgba(0,0,0,.5); }
  #hand .c.hint{ box-shadow:0 0 0 2px var(--gold), 0 6px 14px rgba(0,0,0,.5); }

  /* ---- controls ---- */
  #controls{ display:flex; justify-content:center; gap:10px; flex-wrap:wrap; min-height:46px; padding:6px 4px 2px; }
  .btn{ padding:10px 20px; border-radius:999px; border:none; cursor:pointer; font-family:inherit; font-weight:800;
    font-size:.92rem; color:#fff; background:linear-gradient(135deg,var(--accent),var(--accent2));
    box-shadow:0 5px 14px rgba(192,57,43,.4); transition:transform .1s, opacity .15s; }
  .btn:active{ transform:scale(.95); }
  .btn.gray{ background:linear-gradient(135deg,#5a6677,#3c4656); box-shadow:0 5px 14px rgba(0,0,0,.35); }
  .btn.gold{ background:linear-gradient(135deg,#ffd45e,#f0a830); color:#3a2700; box-shadow:0 5px 14px rgba(240,168,48,.45); }
  .btn:disabled{ opacity:.4; cursor:not-allowed; }
  .btn.big{ font-size:1.05rem; padding:12px 30px; }

  /* ---- overlay (start / result) ---- */
  #ov{ position:absolute; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; text-align:center; background:radial-gradient(120% 90% at 50% 20%, rgba(8,40,33,.86), rgba(4,20,16,.96)); }
  #ov.hide{ display:none; }
  #ov h1{ font-size:2.2rem; font-weight:900; letter-spacing:2px;
    background:linear-gradient(95deg,#ffe08a,#ff9d3c,#ff5a3c); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 4px 18px rgba(0,0,0,.3); }
  #ov .sub{ color:var(--dim); font-size:.9rem; max-width:300px; line-height:1.6; }
  #ov .res{ font-size:3rem; }
  @media (max-height:680px){ .c{ width:42px; height:58px; } #hand{ min-height:84px; } .seat .ava{ width:44px; height:44px; } }
  @media (max-width:380px){ .c{ width:42px; height:58px; } #hand .c{ margin-left:-26px; } }
</style>
