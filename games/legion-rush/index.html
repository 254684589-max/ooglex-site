<script>
"use strict";
(function(){
//==================================================================
//  军团冲锋 / Legion Rush  —  single-file crowd-runner game
//==================================================================
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
let W=0,H=0,DPR=1;

function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.floor(W*DPR); cv.height = Math.floor(H*DPR);
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize); resize();

//------------------------------------------------- audio (WebAudio)
let actx=null, muted=false;
function ac(){ if(!actx){ try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return actx; }
function beep(freq, dur, type, vol, slideTo){
  if(muted) return; const a=ac(); if(!a) return;
  const o=a.createOscillator(), g=a.createGain();
  o.type=type||'square'; o.frequency.value=freq;
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, a.currentTime+dur);
  g.gain.value=vol||0.06; g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime+dur);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+dur);
}
const SFX={
  gateGood:()=>beep(520,.18,'square',.07,880),
  gateBad:()=>beep(200,.22,'sawtooth',.07,90),
  shoot:()=>beep(720+Math.random()*120,.05,'square',.018,300),
  hit:()=>beep(140,.12,'sawtooth',.05,70),
  win:()=>{beep(523,.12,'square',.08);setTimeout(()=>beep(659,.12,'square',.08),120);setTimeout(()=>beep(784,.2,'square',.09),240);setTimeout(()=>beep(1046,.3,'square',.09),380);},
  lose:()=>{beep(330,.2,'sawtooth',.08,160);setTimeout(()=>beep(180,.4,'sawtooth',.08,80),180);},
};

//------------------------------------------------- math helpers
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;

//------------------------------------------------- perspective projection
// d = distance ahead of crowd (0 = at crowd line, larger = further into scene)
const CAM=7.0;
let HORIZON=0, BASE=0, ROAD_HALF=0, CX=0;
function recalc(){ HORIZON=H*0.20; BASE=H*0.95; ROAD_HALF=Math.min(W*0.46, 300); CX=W*0.5; }
function project(lateral, d){
  const t = d/(d+CAM);            // 0 near .. 1 far
  const scale = 1-t;              // 1 near .. 0 far
  const y = HORIZON + (BASE-HORIZON)*scale;
  const half = ROAD_HALF*scale;
  return { x: CX + lateral*half, y, scale, half };
}

//------------------------------------------------- game state
let state='start';     // start | play | end
let level=1;
let worldZ=0;          // how far crowd has advanced
let speed=0;           // forward units/sec
let crowdX=0;          // lateral position -1..1 of crowd center
let targetX=0;
let count=0;           // soldiers (real number)
let displayCount=0;    // animated number
let events=[];         // gates / enemies along the track
let particles=[];
let bullets=[];
let floatTexts=[];
let shake=0;
let runPhase=0;
let finishZ=0;
let bestStreak=0;
let resultWin=false;

//------------------------------------------------- level generation
function genLevel(lv){
  events=[]; bullets=[]; particles=[]; floatTexts=[];
  worldZ=0; crowdX=0; targetX=0; speed=6.2;
  count = 8 + Math.min(lv*2, 20);
  displayCount = count;

  let z = 10;
  const gateCount = 5 + Math.floor(lv*0.7);
  const sign=()=>Math.random()<0.5?-1:1;

  for(let i=0;i<gateCount;i++){
    // a pair of gates: pick a good and a worse option
    const roll=Math.random();
    let L,R;
    const addHuge=()=>({op:'add', val: Math.round(rand(50,99)+lv*5)}); // gold +99 style
    const addBig = ()=>({op:'add', val: Math.round(rand(8,18)+lv*2)});
    const addSmall=()=>({op:'add', val: Math.round(rand(3,8))});
    const mul = ()=>({op:'mul', val: (Math.random()<0.5?2:3)});
    const sub = ()=>({op:'sub', val: Math.round(rand(10,28)+lv*3)});
    const div = ()=>({op:'div', val: 2});
    if(roll<0.4){ L=mul(); R=addSmall(); }
    else if(roll<0.62){ L=addBig(); R=sub(); }
    else if(roll<0.8){ L=mul(); R=div(); }
    else if(roll<0.92){ L=addHuge(); R=sub(); }   // jackpot vs trap
    else { L=addBig(); R=addSmall(); }
    if(Math.random()<0.5){ const t=L; L=R; R=t; }
    events.push({type:'gate', z, left:L, right:R, hit:false});
    z += rand(8,10);

    // occasional mini enemy between gates
    if(i>0 && i<gateCount-1 && Math.random()<0.4){
      events.push({type:'enemy', z, hp: Math.round(rand(20,60)+lv*12), maxhp:0, boss:false, dead:false, fired:false});
      z += rand(9,12);
    }
  }
  // final boss
  z += 6;
  const bossHp = Math.round(120 + lv*70 + lv*lv*8);
  events.push({type:'enemy', z, hp:bossHp, maxhp:bossHp, boss:true, dead:false, fired:false});
  events.forEach(e=>{ if(e.type==='enemy'&&!e.maxhp) e.maxhp=e.hp; });
  finishZ = z + 8;
}

//------------------------------------------------- input
let dragging=false, lastPX=0;
function pointerDown(x){ dragging=true; lastPX=x; if(ac()&&ac().state==='suspended')ac().resume(); }
function pointerMove(x){
  if(!dragging) return;
  const dx=(x-lastPX)/(W*0.5); lastPX=x;
  targetX = clamp(targetX + dx*1.4, -0.92, 0.92);
}
function pointerUp(){ dragging=false; }
cv.addEventListener('touchstart',e=>{e.preventDefault();pointerDown(e.touches[0].clientX);},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();pointerMove(e.touches[0].clientX);},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();pointerUp();},{passive:false});
cv.addEventListener('mousedown',e=>pointerDown(e.clientX));
window.addEventListener('mousemove',e=>pointerMove(e.clientX));
window.addEventListener('mouseup',pointerUp);
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') targetX=clamp(targetX-0.18,-0.92,0.92);
  if(e.key==='ArrowRight') targetX=clamp(targetX+0.18,-0.92,0.92);
});

//------------------------------------------------- effects
function burst(x,y,color,n,spd){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=rand(spd*0.3,spd);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-rand(0,spd*0.4),life:1,color,r:rand(2,5)});
  }
}
function floatText(txt,x,y,color){ floatTexts.push({txt,x,y,life:1,color}); }

//------------------------------------------------- gate / enemy resolution
function applyGate(g){
  const onLeft = crowdX<0;
  const chosen = onLeft? g.left : g.right;
  const before=count;
  if(chosen.op==='add') count+=chosen.val;
  else if(chosen.op==='mul') count*=chosen.val;
  else if(chosen.op==='sub') count=Math.max(0,count-chosen.val);
  else if(chosen.op==='div') count=Math.max(0,Math.floor(count/chosen.val));
  count=Math.round(count);
  const good = count>=before;
  const p=project(chosen===g.left?-0.5:0.5, 0.6);
  const sym = chosen.op==='add'?'+'+chosen.val : chosen.op==='mul'?'×'+chosen.val : chosen.op==='sub'?'-'+chosen.val:'÷'+chosen.val;
  floatText(sym, p.x, p.y-60, good?'#7CFC9A':'#ff7b7b');
  burst(p.x,p.y-30, good?'#7CFC9A':'#ff5b5b', good?22:14, 380);
  good?SFX.gateGood():SFX.gateBad();
  if(count<=0){ endGame(false); }
}

function resolveEnemy(e){
  // crowd reached enemy: trade
  if(count>e.hp){
    count -= e.hp;
    e.dead=true;
    shake=Math.min(shake+ (e.boss?30:16), 34);
    const p=project(0,0.5);
    // grand clash: multiple bursts across the field
    burst(p.x,p.y-40,'#ff4040', e.boss?90:40, 560);
    burst(p.x,p.y-40,'#ffd23f', e.boss?40:18, 460);
    for(let i=0;i<(e.boss?5:2);i++){
      burst(p.x+rand(-W*0.3,W*0.3), p.y-rand(20,160), '#ffffff', 14, 420);
    }
    floatText('-'+e.hp, p.x, p.y-80, '#ff8a8a');
    SFX.hit();
    if(e.boss){ endGame(true); }
  } else {
    // not enough — wiped out
    e.hp-=count; count=0;
    const p=project(0,0.5);
    burst(p.x,p.y-40,'#88aaff',40,460);
    endGame(false);
  }
}

function endGame(win){
  if(state!=='play') return;
  state='end'; resultWin=win;
  win?SFX.win():SFX.lose();
  document.getElementById('hud').classList.add('hidden');
  const es=document.getElementById('endScreen');
  const rt=document.getElementById('resultText'), rs=document.getElementById('resultStat');
  const nb=document.getElementById('nextBtn'), rb=document.getElementById('retryBtn');
  if(win){
    rt.textContent='🏆 胜利！'; rt.className='result win';
    rs.innerHTML='你的军团：<b style="color:#ffd23f">'+Math.round(count).toLocaleString()+'</b> 名战士<br>BOSS 已被碾碎！';
    nb.classList.remove('hidden'); rb.textContent='重玩本关';
  } else {
    rt.textContent='💀 全军覆没'; rt.className='result lose';
    rs.innerHTML='军团撑到了第 <b style="color:#ff8a8a">'+level+'</b> 关<br>再选对几扇门就赢了！';
    nb.classList.add('hidden'); rb.textContent='重新挑战';
  }
  es.classList.remove('hidden');
}

//------------------------------------------------- start / flow
function startLevel(lv){
  level=lv; genLevel(lv);
  document.getElementById('levelNum').textContent=lv;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  state='play';
}
document.getElementById('playBtn').onclick=()=>{ if(ac()&&ac().state==='suspended')ac().resume(); startLevel(1); };
document.getElementById('retryBtn').onclick=()=>startLevel(level);
document.getElementById('nextBtn').onclick=()=>startLevel(level+1);
document.getElementById('muteBtn').onclick=function(){ muted=!muted; this.firstChild.textContent=muted?'🔇':'🔊'; };

//==================================================================
//  DRAWING
//==================================================================
function drawBackground(){
  // sky
  const sky=ctx.createLinearGradient(0,0,0,HORIZON+40);
  sky.addColorStop(0,'#0b1640'); sky.addColorStop(0.6,'#16317a'); sky.addColorStop(1,'#2f5bc7');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,HORIZON+40);
  // glow at horizon
  const g=ctx.createRadialGradient(CX,HORIZON,10,CX,HORIZON,W*0.7);
  g.addColorStop(0,'rgba(120,170,255,.45)'); g.addColorStop(1,'rgba(120,170,255,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,HORIZON+120);

  // ground
  ctx.fillStyle='#caa46b';
  ctx.fillRect(0,HORIZON,W,H-HORIZON);
  const gg=ctx.createLinearGradient(0,HORIZON,0,H);
  gg.addColorStop(0,'#9c7b46'); gg.addColorStop(0.5,'#caa46b'); gg.addColorStop(1,'#e2c894');
  ctx.fillStyle=gg; ctx.fillRect(0,HORIZON,W,H-HORIZON);

  // road (trapezoid)
  const nb=project(-1,0), nbr=project(1,0), fb=project(-1,40), fbr=project(1,40);
  ctx.beginPath();
  ctx.moveTo(nb.x,nb.y); ctx.lineTo(nbr.x,nbr.y); ctx.lineTo(fbr.x,fbr.y); ctx.lineTo(fb.x,fb.y); ctx.closePath();
  const rg=ctx.createLinearGradient(0,HORIZON,0,H);
  rg.addColorStop(0,'#8a6f44'); rg.addColorStop(1,'#b89863');
  ctx.fillStyle=rg; ctx.fill();

  // scrolling lane stripes for sense of speed
  ctx.save(); ctx.clip();
  ctx.fillStyle='rgba(255,255,255,0.05)';
  for(let i=0;i<14;i++){
    const dz=i*4 - (worldZ%4);
    const a=project(-1,dz), b=project(1,dz), a2=project(-1,dz+2), b2=project(1,dz+2);
    if(i%2===0){
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.lineTo(b2.x,b2.y);ctx.lineTo(a2.x,a2.y);ctx.closePath();ctx.fill();
    }
  }
  ctx.restore();

  // stadium side walls (left blue seats, right ice-green like reference)
  drawWall(-1, '#3a63c8','#28439a');   // left -> blue seating
  drawWall(1, '#2fae8e','#1c7d63');    // right -> green
}

function drawWall(side, c1, c2){
  // wall rises from road edge upward; near (d=0) to far (d~38)
  const near=project(side,0), far=project(side,40);
  const topNear=BASE - (BASE-HORIZON)*0.0 ;
  // build polygon: bottom edge near->far, top edge far->near (raised)
  const wallH_near = (BASE-HORIZON)*0.9, wallH_far=(HORIZON*0.0);
  const nbX=near.x, nbY=near.y, fbX=far.x, fbY=far.y;
  const ntY=near.y-260*near.scale, ftY=far.y-260*far.scale;
  ctx.beginPath();
  ctx.moveTo(nbX,nbY); ctx.lineTo(fbX,fbY); ctx.lineTo(fbX,ftY); ctx.lineTo(nbX,ntY); ctx.closePath();
  const wg=ctx.createLinearGradient(0,HORIZON,0,H);
  wg.addColorStop(0,c2); wg.addColorStop(1,c1);
  ctx.fillStyle=wg; ctx.fill();
  // seat rows
  ctx.save(); ctx.clip();
  ctx.strokeStyle='rgba(255,255,255,.10)'; ctx.lineWidth=2;
  for(let r=0;r<10;r++){
    const dz=r*4 - (worldZ%4)*0; // static rows look fine
    const p=project(side, r*4.2);
    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x, p.y-260*p.scale); ctx.stroke();
  }
  // horizontal tiers
  for(let t=1;t<6;t++){
    const yy=lerp(near.y, near.y-260*near.scale, t/6);
    ctx.beginPath(); ctx.moveTo(near.x,yy); ctx.lineTo(far.x, lerp(far.y,far.y-260*far.scale,t/6)); ctx.stroke();
  }
  ctx.restore();
}

function drawSoldier(x,y,size,color,phase,enemy){
  const s=size;
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(x,y+s*0.06,s*0.5,s*0.18,0,0,Math.PI*2); ctx.fill();
  const sw=Math.sin(phase)*s*0.12;
  // legs
  ctx.strokeStyle=enemy?'#7a1414':'#1c2c66'; ctx.lineWidth=s*0.16; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x-s*0.12,y-s*0.05); ctx.lineTo(x-s*0.16+sw,y-s*0.55); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+s*0.12,y-s*0.05); ctx.lineTo(x+s*0.16-sw,y-s*0.55); ctx.stroke();
  // body
  const bg=ctx.createLinearGradient(x-s*0.3,y-s,x+s*0.3,y);
  bg.addColorStop(0, enemy?'#ff6a6a':'#6ea0ff'); bg.addColorStop(1,color);
  ctx.fillStyle=bg;
  roundRect(x-s*0.26, y-s*1.15, s*0.52, s*0.7, s*0.18); ctx.fill();
  // head
  ctx.fillStyle= enemy?'#ffd9d9':'#ffe1c4';
  ctx.beginPath(); ctx.arc(x, y-s*1.32, s*0.22,0,Math.PI*2); ctx.fill();
  // helmet
  ctx.fillStyle= enemy?'#b81d1d':'#21409c';
  ctx.beginPath(); ctx.arc(x, y-s*1.36, s*0.24, Math.PI, 0); ctx.fill();
  ctx.fillRect(x-s*0.24,y-s*1.38,s*0.48,s*0.06);
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

function drawCrowd(){
  const n = Math.min(count, 90);
  const cols = Math.ceil(Math.sqrt(n*1.4));
  let i=0;
  const units=[];
  for(let r=0; i<n; r++){
    for(let c=0;c<cols && i<n;c++,i++){
      const colsInRow=Math.min(cols, n-r*cols);
      const lat = crowdX + ((c-(colsInRow-1)/2)/cols)*0.7;
      const d = 0.15 + r*0.22 + (c%2)*0.05;
      units.push({lat,d,phase:runPhase+i*0.6});
    }
  }
  units.sort((a,b)=>b.d-a.d);
  for(const u of units){
    const p=project(clamp(u.lat,-1.05,1.05), u.d);
    const size=clamp(54*p.scale,8,60);
    drawSoldier(p.x,p.y,size,'#2a59d6',u.phase,false);
  }
}

function drawGate(g){
  const d=g.z-worldZ;
  if(d<-1||d>34) return;
  drawPanel(g.left, -0.5, d);
  drawPanel(g.right, 0.5, d);
  // center post
  const top=project(0,d), top2=project(0,d);
  const ptop=project(0,d);
  ctx.fillStyle='rgba(255,255,255,.85)';
  const w=10*ptop.scale;
  ctx.fillRect(ptop.x-w/2, ptop.y-300*ptop.scale, w, 300*ptop.scale);
}
function drawPanel(opt, lateral, d){
  const good = opt.op==='add'||opt.op==='mul';
  const gold = opt.op==='add' && opt.val>=40;   // jackpot gate
  const base=project(lateral,d);
  const left=project(lateral-0.5,d), right=project(lateral+0.5,d);
  const panelH=300*base.scale;
  const x0=left.x, x1=right.x, yb=base.y, yt=base.y-panelH;
  const col = gold? 'rgba(255,200,60,' : good? 'rgba(80,230,140,' : 'rgba(255,90,90,';
  const grd=ctx.createLinearGradient(0,yt,0,yb);
  grd.addColorStop(0, col+'0.12)'); grd.addColorStop(1, col+(gold?'0.6)':'0.5)'));
  ctx.fillStyle=grd;
  ctx.fillRect(Math.min(x0,x1), yt, Math.abs(x1-x0), panelH);
  // glowing border
  ctx.strokeStyle= gold?'#ffd23f': good?'#7CFC9A':'#ff7b7b'; ctx.lineWidth=Math.max(2,(gold?5:4)*base.scale);
  ctx.shadowColor=ctx.strokeStyle; ctx.shadowBlur=18*base.scale;
  ctx.strokeRect(Math.min(x0,x1), yt, Math.abs(x1-x0), panelH);
  ctx.shadowBlur=0;
  // text
  const sym = opt.op==='add'?'+'+opt.val : opt.op==='mul'?'×'+opt.val : opt.op==='sub'?'-'+opt.val:'÷'+opt.val;
  const fs=clamp(64*base.scale,10,64);
  ctx.font='900 '+fs+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.lineWidth=fs*0.14; ctx.strokeStyle='rgba(0,0,0,.55)';
  ctx.strokeText(sym, base.x, yt+panelH*0.5);
  ctx.fillStyle='#fff'; ctx.fillText(sym, base.x, yt+panelH*0.5);
}

function drawEnemy(e){
  const d=e.z-worldZ;
  if(e.dead || d<-1 || d>34) return;
  const p=project(crowdX*0.2, d);
  const size=clamp((e.boss?150:90)*p.scale, 10, e.boss?160:100);

  // ----- red army field behind the boss (sea of red soldiers) -----
  const army = clamp(Math.round(e.hp/ (e.boss?7:9)), 0, e.boss?120:40);
  const acols = Math.ceil(Math.sqrt(army*1.3));
  let ai=0; const reds=[];
  for(let r=0; ai<army; r++){
    for(let c=0;c<acols && ai<army;c++,ai++){
      const colsInRow=Math.min(acols, army-r*acols);
      const lat = (crowdX*0.15) + ((c-(colsInRow-1)/2)/acols)*1.5;
      const dd = d + 0.4 + r*0.45;     // stacked deeper into the scene
      reds.push({lat,dd,phase:runPhase*0.25+ai});
    }
  }
  reds.sort((a,b)=>b.dd-a.dd);
  for(const u of reds){
    const rp=project(clamp(u.lat,-1.4,1.4), u.dd);
    const rs=clamp(64*rp.scale,4,46);
    drawSoldier(rp.x,rp.y,rs,'#d62424',u.phase,true);
  }

  // big enemy figure (boss leader)
  drawSoldier(p.x, p.y, size, e.boss?'#c01818':'#e23b3b', runPhase*0.3, true);
  // HP bar
  const bw=Math.max(40, size*1.6), bh=Math.max(8,size*0.16);
  const by=p.y-size*1.7;
  ctx.fillStyle='rgba(0,0,0,.5)'; roundRect(p.x-bw/2,by,bw,bh,bh/2); ctx.fill();
  const frac=clamp(e.hp/e.maxhp,0,1);
  ctx.fillStyle= e.boss?'#ff3b3b':'#ff7b3b'; roundRect(p.x-bw/2,by,bw*frac,bh,bh/2); ctx.fill();
  // hp number
  const fs=clamp(size*0.42,12,52);
  ctx.font='900 '+fs+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.lineWidth=fs*0.16; ctx.strokeStyle='rgba(0,0,0,.6)';
  ctx.strokeText(Math.max(0,Math.round(e.hp)), p.x, by-fs*0.7);
  ctx.fillStyle='#fff'; ctx.fillText(Math.max(0,Math.round(e.hp)), p.x, by-fs*0.7);
}

function drawBullets(){
  ctx.fillStyle='#fff';
  for(const b of bullets){
    const p=project(b.lat, b.d);
    const s=clamp(10*p.scale,2,10);
    ctx.fillStyle='rgba(255,255,255,'+(0.6+0.4*Math.random())+')';
    ctx.beginPath(); ctx.ellipse(p.x,p.y,s*0.4,s*1.4,0,0,Math.PI*2); ctx.fill();
  }
}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=clamp(p.life,0,1);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawFloatTexts(){
  for(const f of floatTexts){
    ctx.globalAlpha=clamp(f.life,0,1);
    const fs=44;
    ctx.font='900 '+fs+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.lineWidth=fs*0.16; ctx.strokeStyle='rgba(0,0,0,.6)';
    ctx.strokeText(f.txt,f.x,f.y); ctx.fillStyle=f.color; ctx.fillText(f.txt,f.x,f.y);
  }
  ctx.globalAlpha=1;
}

function drawBigCount(){
  // big white number with black outline near crowd (like reference "799")
  const v=Math.round(displayCount);
  const fs=clamp(W*0.16, 48, 110);
  ctx.font='900 '+fs+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  const x=CX + ROAD_HALF*0.62, y=BASE-H*0.30;
  ctx.save();
  const pop = 1+0.06*Math.sin(performance.now()/120);
  ctx.translate(x,y); ctx.scale(pop,pop);
  ctx.lineWidth=fs*0.14; ctx.strokeStyle='#1a1a1a'; ctx.lineJoin='round';
  ctx.strokeText(v.toLocaleString(),0,0);
  const grd=ctx.createLinearGradient(0,-fs/2,0,fs/2);
  grd.addColorStop(0,'#ffffff'); grd.addColorStop(1,'#bfe0ff');
  ctx.fillStyle=grd; ctx.fillText(v.toLocaleString(),0,0);
  ctx.restore();
}

//==================================================================
//  UPDATE LOOP
//==================================================================
let last=performance.now();
function frame(now){
  let dt=(now-last)/1000; last=now; dt=Math.min(dt,0.05);
  recalc();
  if(state==='play') update(dt);
  render();
  requestAnimationFrame(frame);
}

function update(dt){
  // accelerate
  speed = Math.min(speed + dt*0.6, 9 + level*0.4);
  worldZ += speed*dt;
  runPhase += dt*speed*1.4;
  crowdX = lerp(crowdX, targetX, clamp(dt*9,0,1));
  displayCount = lerp(displayCount, count, clamp(dt*10,0,1));

  // win if passed finish (safety)
  // events
  for(const e of events){
    const d=e.z-worldZ;
    if(e.type==='gate' && !e.hit && d<=0){ e.hit=true; applyGate(e); }
    if(e.type==='enemy' && !e.dead){
      // shooting visual when close
      if(d<7 && d>0.4 && state==='play'){
        if(Math.random()<count*0.02*dt*60){ /* throttle */ }
        if(Math.random()<0.6){ bullets.push({lat:crowdX+rand(-0.25,0.25), d:0.3, target:d}); SFX.shoot(); }
        // drain HP for feedback (visual), real resolve on contact
        e.hp -= count*dt*0.6;
      }
      if(d<=0.45){
        if(e.hp<=0){ e.dead=true; if(e.boss) endGame(true); }
        else resolveEnemy(e);
      }
    }
  }

  // bullets travel forward
  for(const b of bullets){ b.d += speed*2.2*dt; }
  bullets=bullets.filter(b=>b.d<b.target+1 && b.d<34);

  // particles
  for(const p of particles){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=900*dt; p.life-=dt*1.4; }
  particles=particles.filter(p=>p.life>0);
  for(const f of floatTexts){ f.y-=40*dt; f.life-=dt*0.9; }
  floatTexts=floatTexts.filter(f=>f.life>0);

  if(shake>0) shake=Math.max(0,shake-dt*60);
}

function render(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shake>0){ ctx.translate(rand(-shake,shake),rand(-shake,shake)); }

  drawBackground();

  // draw far-to-near: gates & enemies sorted by distance
  const objs=events.filter(e=>{const d=e.z-worldZ;return d>-1&&d<34;}).sort((a,b)=>(b.z)-(a.z));
  for(const e of objs){ if(e.type==='gate')drawGate(e); else drawEnemy(e); }

  drawBullets();
  drawCrowd();
  drawParticles();
  drawFloatTexts();
  if(state==='play'||state==='end') drawBigCount();

  ctx.restore();
}

requestAnimationFrame(frame);
})();
</script>
