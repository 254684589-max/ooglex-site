<script>
"use strict";
(function(){
//==================================================================
//  跳一跳 · Jump Jump — single-file isometric hop game
//==================================================================
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
let W=0,H=0,DPR=1,ZOOM=1;

function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.floor(W*DPR); cv.height = Math.floor(H*DPR);
  cv.style.width = W+'px'; cv.style.height = H+'px';
  ZOOM = Math.max(.55, Math.min(1.35, Math.min(W/560, H/800)));
}
window.addEventListener('resize', resize); resize();

//------------------------------------------------- helpers
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const lerp=(a,b,t)=>a+(b-a)*t;
const easeOutCubic=t=>1-Math.pow(1-t,3);
const easeInQuad=t=>t*t;
const nowS=()=>performance.now()/1000;

// isometric projection: +x = up-right, +z = up-left on screen
const IX=0.8660254, IY=0.5;
const px=(x,z)=>(x-z)*IX;
const py=(x,z,y)=>-(x+z)*IY-(y||0);

//==================================================================
//  AUDIO — WebAudio bgm + sfx
//==================================================================
const AU = { ctx:null, master:null, music:null, sfx:null, delay:null, noise:null, on:false, muted:false };

function audioInit(){
  if(AU.ctx) return;
  try{
    const a = new (window.AudioContext||window.webkitAudioContext)();
    AU.ctx = a;
    AU.master = a.createGain(); AU.master.gain.value = 1; AU.master.connect(a.destination);
    AU.music = a.createGain(); AU.music.gain.value = .8; AU.music.connect(AU.master);
    AU.sfx   = a.createGain(); AU.sfx.gain.value = 1;   AU.sfx.connect(AU.master);
    // gentle echo bus for the plucks
    AU.delay = a.createDelay(1); AU.delay.delayTime.value = .29;
    const fb = a.createGain(); fb.gain.value = .26;
    const wet = a.createGain(); wet.gain.value = .2;
    AU.delay.connect(fb); fb.connect(AU.delay); AU.delay.connect(wet); wet.connect(AU.music);
    // shared noise buffer
    const len = a.sampleRate*.3, buf = a.createBuffer(1,len,a.sampleRate), d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    AU.noise = buf;
    AU.on = true;
  }catch(e){}
}
function setMuted(m){
  AU.muted = m;
  if(AU.master) AU.master.gain.value = m?0:1;
  document.getElementById('muteBtn').textContent = m?'🔇':'🔊';
}
document.addEventListener('visibilitychange',()=>{
  if(!AU.ctx) return;
  if(document.hidden) AU.ctx.suspend(); else if(!AU.muted) AU.ctx.resume();
});

//----- music: soft marimba loop in C pentatonic
const NF={G2:98,A2:110,C3:130.81,F2:87.31,F3:174.61,G3:196,A3:220,C4:261.63,D4:293.66,E4:329.63,G4:392,A4:440,C5:523.25,D5:587.33,E5:659.25,G5:783.99,A5:880};
const MEL=['E5',0,'G5',0,'A5',0,'G5','E5','D5',0,'E5',0,'C5',0,0,0,'A4',0,'C5',0,'D5',0,'E5','D5','C5',0,'A4',0,'G4',0,0,0];
const BASS=['C3','A2','F2','G2'];
const PAD=[['C4','G4'],['A3','E4'],['F3','C4'],['G3','D4']];
const STEP=60/92/2; // 8th notes @92bpm
let musicStep=0, musicNext=0, musicTimer=null;

function pluck(f,t){
  const a=AU.ctx, o=a.createOscillator(), g=a.createGain(), lp=a.createBiquadFilter();
  o.type='triangle'; o.frequency.value=f;
  lp.type='lowpass'; lp.frequency.value=2100;
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.062,t+.006); g.gain.exponentialRampToValueAtTime(.0004,t+.42);
  o.connect(g); g.connect(lp); lp.connect(AU.music); lp.connect(AU.delay);
  o.start(t); o.stop(t+.48);
}
function bassN(f,t){
  const a=AU.ctx, o=a.createOscillator(), g=a.createGain();
  o.type='sine'; o.frequency.value=f;
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.055,t+.02); g.gain.exponentialRampToValueAtTime(.0004,t+.6);
  o.connect(g); g.connect(AU.music); o.start(t); o.stop(t+.65);
}
function padN(fs,t,dur){
  const a=AU.ctx, lp=a.createBiquadFilter();
  lp.type='lowpass'; lp.frequency.value=750; lp.connect(AU.music);
  fs.forEach(f=>{
    const o=a.createOscillator(), g=a.createGain();
    o.type='sine'; o.frequency.value=NF[f];
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.016,t+.5); g.gain.linearRampToValueAtTime(.0001,t+dur);
    o.connect(g); g.connect(lp); o.start(t); o.stop(t+dur+.05);
  });
}
function hat(t){
  const a=AU.ctx, s=a.createBufferSource(), g=a.createGain(), hp=a.createBiquadFilter();
  s.buffer=AU.noise; hp.type='highpass'; hp.frequency.value=6500;
  g.gain.setValueAtTime(.013,t); g.gain.exponentialRampToValueAtTime(.0004,t+.05);
  s.connect(hp); hp.connect(g); g.connect(AU.music); s.start(t); s.stop(t+.06);
}
function musicTick(){
  if(!AU.on) return;
  const a=AU.ctx;
  while(musicNext < a.currentTime + .32){
    const s = musicStep % 32;
    const m = MEL[s]; if(m) pluck(NF[m], musicNext);
    if(s%8===0){ const bar=(s/8)|0; bassN(NF[BASS[bar]], musicNext); padN(PAD[bar], musicNext, STEP*8); }
    if(s%4===3) hat(musicNext);
    musicNext += STEP; musicStep++;
  }
}
function musicStart(){
  if(!AU.on || musicTimer) return;
  musicNext = AU.ctx.currentTime + .1; musicStep = 0;
  musicTimer = setInterval(musicTick, 110); musicTick();
}

//----- sfx
function tone(f,dur,type,vol,slideTo,when){
  if(!AU.on) return;
  const a=AU.ctx, t=when||a.currentTime, o=a.createOscillator(), g=a.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(f,t);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20,slideTo),t+dur);
  g.gain.setValueAtTime(vol||.05,t); g.gain.exponentialRampToValueAtTime(.0004,t+dur);
  o.connect(g); g.connect(AU.sfx); o.start(t); o.stop(t+dur+.02);
}
function noiseHit(dur,vol,fc,type){
  if(!AU.on) return;
  const a=AU.ctx, t=a.currentTime, s=a.createBufferSource(), g=a.createGain(), f=a.createBiquadFilter();
  s.buffer=AU.noise; f.type=type||'lowpass'; f.frequency.value=fc||900;
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.0004,t+dur);
  s.connect(f); f.connect(g); g.connect(AU.sfx); s.start(t); s.stop(t+dur+.02);
}
let chOsc=null, chGain=null;
function sfxChargeStart(){
  if(!AU.on) return; sfxChargeEnd(true);
  const a=AU.ctx, t=a.currentTime;
  chOsc=a.createOscillator(); chGain=a.createGain();
  chOsc.type='sine'; chOsc.frequency.setValueAtTime(170,t);
  chOsc.frequency.exponentialRampToValueAtTime(980,t+CHARGE_TIME);
  chGain.gain.setValueAtTime(.0001,t); chGain.gain.exponentialRampToValueAtTime(.045,t+.12);
  chOsc.connect(chGain); chGain.connect(AU.sfx); chOsc.start(t);
}
function sfxChargeEnd(silent){
  if(chOsc){ try{
    const t=AU.ctx.currentTime;
    chGain.gain.cancelScheduledValues(t); chGain.gain.setValueAtTime(chGain.gain.value,t);
    chGain.gain.exponentialRampToValueAtTime(.0004,t+.05); chOsc.stop(t+.08);
  }catch(e){} chOsc=null; chGain=null; }
  if(!silent){}
}
const SFX={
  jump(){ tone(300,.18,'sine',.06,620); noiseHit(.14,.05,1500,'bandpass'); },
  land(){ tone(150,.14,'sine',.09,55); noiseHit(.07,.045,800); },
  perfect(c){
    const f = 660*Math.pow(1.1225, Math.min(c,10));
    tone(f,.24,'sine',.075); if(AU.on) tone(f*1.5,.3,'sine',.06,0,AU.ctx.currentTime+.07);
    noiseHit(.12,.02,8000,'highpass');
  },
  fall(){ tone(520,.42,'sawtooth',.055,110); if(AU.on) tone(120,.22,'sine',.08,45,AU.ctx.currentTime+.3); },
  pop(){ tone(480,.06,'sine',.025,760); },
  click(){ tone(700,.06,'square',.035); },
};

//==================================================================
//  WORLD
//==================================================================
const BH = 58;               // block height
const CHARGE_TIME = 1.4;     // seconds to full power
const D_MIN = 40, D_MAX = 350;
const PERFECT_R = 13;

const PALS=[
  {h:225,s:14,l:93},{h:228,s:10,l:87},{h:105,s:32,l:76},{h:26,s:78,l:74},
  {h:203,s:58,l:78},{h:340,s:52,l:81},{h:52,s:68,l:79},{h:262,s:38,l:81},{h:168,s:40,l:74},
];
const RUBIK=['#ffffff','#ffd500','#ff5800','#c41e3a','#009e60','#0051ba'];
const hsl=(h,s,l)=>`hsl(${h.toFixed(1)},${s.toFixed(1)}%,${l.toFixed(1)}%)`;

let blocks=[], curBlock=null, nextBlock=null;
let piece={x:0,z:0,y:BH,sx:1,sy:1,sxv:0,syv:0,rot:0};
let state='menu'; // menu | play | charge | fly | fallout | tip | over
let score=0, best=0, combo=0, jumps=0;
let chargeT0=0, power=0;
let fly=null, fallV=0, tip=null;
let particles=[], texts=[], rings=[];
let cam={x:0,y:0,tx:0,ty:0};
let bgCur=[[228,26,93],[228,20,81]];

try{ best = parseInt(localStorage.getItem('jumpjump_best')||'0',10)||0; }catch(e){}

function makeBlock(x,z,size,first){
  const b={x,z,size,q:0,qv:0,dropT0:first?-9:nowS(),landed:!!first,yOff:first?0:230};
  b.shape = Math.random()<.22 ? 'cyl' : 'box';
  const r = Math.random();
  b.deco = 'plain';
  if(b.shape==='box'){
    if(r<.20) b.deco='stripe';
    else if(r<.28) b.deco='rubik';
    else if(r<.35) b.deco='face';
    else if(r<.40) b.deco='gift';
  }else if(r<.35) b.deco='stripe';
  let pal = PALS[(Math.random()*PALS.length)|0];
  if(b.deco==='face'||b.deco==='rubik') pal = PALS[0];
  b.top   = hsl(pal.h,pal.s,Math.min(97,pal.l+4));
  b.topHi = hsl(pal.h,pal.s,Math.min(99,pal.l+9));
  b.right = hsl(pal.h,pal.s,pal.l-13);
  b.left  = hsl(pal.h,pal.s,pal.l-25);
  b.stripeA = hsl(pal.h,pal.s,pal.l-16);
  b.stripeB = hsl(pal.h,Math.max(6,pal.s-18),Math.min(96,pal.l+6));
  b.ribbon  = hsl((pal.h+150)%360,60,62);
  if(b.deco==='rubik'){
    b.cells=[];
    for(let f=0;f<3;f++){ const arr=[]; for(let i=0;i<9;i++) arr.push(RUBIK[(Math.random()*6)|0]); b.cells.push(arr); }
  }
  return b;
}

function spawnNext(){
  const cur = nextBlock || curBlock;
  const diff = Math.min(1, score/55);
  const size = rand(34, 58-16*diff);
  const gap  = cur.size + size + 30 + rand(36, 116+140*diff);
  const dist = Math.min(gap, 325);
  const dirX = Math.random()<.5;
  const nb = makeBlock(dirX?cur.x+dist:cur.x, dirX?cur.z:cur.z+dist, size);
  blocks.push(nb);
  if(blocks.length>13) blocks.splice(0, blocks.length-13);
  nextBlock = nb;
  SFX.pop();
}

function focusCam(hard){
  const fx=(curBlock.x+nextBlock.x)/2, fz=(curBlock.z+nextBlock.z)/2;
  cam.tx = px(fx,fz); cam.ty = py(fx,fz,BH);
  if(hard){ cam.x=cam.tx; cam.y=cam.ty; }
}

function resetWorld(){
  blocks=[]; particles=[]; texts=[]; rings=[];
  score=0; combo=0; jumps=0; fly=null; tip=null;
  const b0 = makeBlock(0,0,52,true);
  blocks.push(b0);
  curBlock=b0; nextBlock=b0;
  piece={x:0,z:0,y:BH,sx:1,sy:1,sxv:0,syv:0,rot:0};
  spawnNext();
  focusCam(true);
  updateHud();
}

//==================================================================
//  GAME FLOW
//==================================================================
const $=id=>document.getElementById(id);
function updateHud(){
  $('scoreNum').textContent = score;
  $('bestTag').textContent = '最佳 '+Math.max(best,score);
}

function startCharge(){
  if(state!=='play') return;
  state='charge'; chargeT0=nowS(); power=0;
  sfxChargeStart();
}

function releaseJump(){
  if(state!=='charge') return;
  sfxChargeEnd();
  $('hint').classList.add('hidden');
  const p = power;
  const d = D_MIN + (D_MAX-D_MIN)*p;
  const dirX = nextBlock.x !== curBlock.x;
  fly = {
    t0: nowS(), T: .55+.2*p,
    fx: piece.x, fz: piece.z,
    tx: piece.x + (dirX?d:0), tz: piece.z + (dirX?0:d),
    h: 95+150*p,
    spin: d>170 ? (dirX?1:-1) : 0,
  };
  curBlock.q = 0; curBlock.qv = -90;   // block springs back up
  state='fly';
  SFX.jump();
  // dust ring at take-off
  burstDust(piece.x, piece.z, BH, 7, '160,160,190');
}

function burstDust(x,z,y,n,rgb){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=rand(26,80);
    particles.push({x,z,y:y+2,vx:Math.cos(a)*sp,vz:Math.sin(a)*sp,vy:rand(10,50),
      t0:nowS(),life:rand(.3,.6),r:rand(2,4.5),rgb});
  }
}
function burstSpark(x,z,y){
  for(let i=0;i<14;i++){
    const a=Math.random()*Math.PI*2, sp=rand(30,120);
    particles.push({x,z,y:y+4,vx:Math.cos(a)*sp,vz:Math.sin(a)*sp,vy:rand(40,130),
      t0:nowS(),life:rand(.4,.8),r:rand(1.5,3.5),rgb:'255,205,90'});
  }
}
function addText(x,z,y,txt,col,size){
  texts.push({x,z,y,txt,col,size:size||26,t0:nowS()});
}

function inside(b,x,z,m){
  const dx=x-b.x, dz=z-b.z, s=b.size+(m||0);
  return b.shape==='cyl' ? Math.hypot(dx,dz)<=s : Math.max(Math.abs(dx),Math.abs(dz))<=s;
}

function resolveLanding(){
  const lx=piece.x, lz=piece.z;
  if(inside(nextBlock,lx,lz)){
    // landed on target
    const dist=Math.hypot(lx-nextBlock.x, lz-nextBlock.z);
    piece.y=BH;
    nextBlock.qv += 70; // bounce the block
    piece.sy=.72; piece.sx=1.24;
    curBlock=nextBlock;
    jumps++;
    if(dist<=PERFECT_R){
      combo++;
      const bonus=Math.min(32, Math.pow(2,combo));
      score+=bonus;
      addText(lx,lz,BH+62,'+'+bonus,'#e8a020',30);
      if(combo>1) addText(lx,lz,BH+94,'连击 ×'+combo,'#e8a020',16);
      rings.push({x:lx,z:lz,y:BH,t0:nowS(),s:curBlock.size});
      burstSpark(lx,lz,BH);
      SFX.perfect(combo);
      if(navigator.vibrate) try{navigator.vibrate(30);}catch(e){}
    }else{
      combo=0; score+=1;
      addText(lx,lz,BH+62,'+1','#6b6890',24);
      SFX.land();
      if(navigator.vibrate) try{navigator.vibrate(12);}catch(e){}
    }
    burstDust(lx,lz,BH,8,'150,150,180');
    spawnNext(); focusCam(false); updateHud();
    state='play';
  }
  else if(inside(curBlock,lx,lz)){
    // small hop back onto same block
    piece.y=BH; piece.sy=.8; piece.sx=1.15; combo=0;
    curBlock.qv+=50; SFX.land(); state='play';
  }
  else if(inside(nextBlock,lx,lz,16) || inside(curBlock,lx,lz,16)){
    // clipped the edge → tip over
    const b = inside(nextBlock,lx,lz,16)?nextBlock:curBlock;
    let dx=lx-b.x, dz=lz-b.z;
    const ax=Math.abs(dx)>=Math.abs(dz);
    const ox=ax?Math.sign(dx)||1:0, oz=ax?0:Math.sign(dz)||1;
    tip={t0:nowS(), ox, oz, bx:lx, bz:lz, sgn:(ox-oz)>=0?1:-1};
    state='tip'; SFX.fall();
  }
  else{
    // straight down into the void
    state='fallout'; fallV=-4*fly.h/fly.T; SFX.fall();
  }
}

function gameOver(){
  state='over';
  sfxChargeEnd(true);
  const nb = score>best;
  if(nb){ best=score; try{localStorage.setItem('jumpjump_best',''+best);}catch(e){} }
  setTimeout(()=>{
    $('endScore').textContent=score;
    $('endBest').textContent=best;
    $('newBest').classList.toggle('hidden',!nb);
    $('endScreen').classList.remove('hidden');
  }, 480);
}

//==================================================================
//  UPDATE
//==================================================================
let lastT=nowS();
function update(){
  const t=nowS(); let dt=Math.min(.033, t-lastT); lastT=t;

  // camera
  const k=1-Math.exp(-dt*3.4);
  cam.x+=(cam.tx-cam.x)*k; cam.y+=(cam.ty-cam.y)*k;

  // background palette follows score
  const BGS=[[[228,26,93],[228,20,81]],[[160,26,92],[160,22,79]],[[28,42,93],[24,34,81]],
             [[205,40,92],[205,32,80]],[[268,30,92],[268,24,81]],[[340,34,93],[338,26,82]]];
  const bi=Math.floor(score/12)%BGS.length, bf=(score%12)/12, bn=(bi+1)%BGS.length;
  for(let j=0;j<2;j++) for(let c=0;c<3;c++){
    const tgt=lerp(BGS[bi][j][c],BGS[bn][j][c],bf);
    bgCur[j][c]+=(tgt-bgCur[j][c])*Math.min(1,dt*2);
  }

  // block springs + drop-in
  for(const b of blocks){
    if(!b.landed){
      const bt=(t-b.dropT0)/.5;
      b.yOff = bt>=1?0:(1-easeOutCubic(clamp(bt,0,1)))*230;
      if(bt>=1){ b.landed=true; b.qv+=55; burstDust(b.x,b.z,0,5,'150,150,180'); }
    }
    if(state==='charge' && b===curBlock){
      b.q += (16*power - b.q)*Math.min(1,dt*18); b.qv=0;
    }else{
      b.qv += (-b.q*160 - b.qv*9)*dt; b.q += b.qv*dt;
    }
  }

  // piece scale springs back toward 1
  if(state==='play'||state==='over'){
    piece.sxv+=(1-piece.sx)*220*dt - piece.sxv*10*dt; piece.sx+=piece.sxv*dt;
    piece.syv+=(1-piece.sy)*220*dt - piece.syv*10*dt; piece.sy+=piece.syv*dt;
  }

  if(state==='play'){
    piece.rot=0;
    piece.y = BH - curBlock.q + Math.sin(t*2.6)*.6; // idle breathing
  }
  else if(state==='charge'){
    power = clamp((t-chargeT0)/CHARGE_TIME, 0, 1);
    piece.sy = 1-.34*power; piece.sx = 1+.26*power; piece.sxv=piece.syv=0;
    piece.y = BH - curBlock.q;
    if(Math.random()<power*.7){
      const a=Math.random()*Math.PI*2, r=curBlock.size*.7;
      particles.push({x:piece.x+Math.cos(a)*r,z:piece.z+Math.sin(a)*r,y:BH-curBlock.q,
        vx:0,vz:0,vy:rand(30,70),t0:t,life:.5,r:rand(1.5,3),rgb:'255,215,120'});
    }
  }
  else if(state==='fly'){
    const p=clamp((t-fly.t0)/fly.T,0,1);
    piece.x=lerp(fly.fx,fly.tx,p); piece.z=lerp(fly.fz,fly.tz,p);
    piece.y=BH + 4*fly.h*p*(1-p);
    piece.rot = fly.spin ? fly.spin*p*Math.PI*2 : 0;
    piece.sy=1.1; piece.sx=.94;
    if(p>=1){ piece.rot=0; resolveLanding(); }
  }
  else if(state==='fallout'){
    fallV -= 1600*dt;
    piece.y += fallV*dt;
    if(piece.y<=6){
      piece.y=6; burstDust(piece.x,piece.z,4,10,'140,140,170');
      gameOver();
    }
  }
  else if(state==='tip'){
    const tt=(t-tip.t0);
    piece.rot = tip.sgn*easeInQuad(clamp(tt/.55,0,1))*1.8;
    piece.x = tip.bx + tip.ox*tt*38; piece.z = tip.bz + tip.oz*tt*38;
    const ft=clamp((tt-.12)/.5,0,1);
    piece.y = BH*(1-easeInQuad(ft)) + 6*ft;
    if(tt>=.66){ burstDust(piece.x,piece.z,4,8,'140,140,170'); gameOver(); }
  }

  // particles / texts / rings
  particles=particles.filter(pp=>t-pp.t0<pp.life);
  for(const pp of particles){
    pp.x+=pp.vx*dt; pp.z+=pp.vz*dt; pp.y+=pp.vy*dt; pp.vy-=200*dt;
    if(pp.y<0)pp.y=0;
  }
  texts=texts.filter(tx=>t-tx.t0<1);
  rings=rings.filter(r=>t-r.t0<.55);
}

//==================================================================
//  RENDER
//==================================================================
const CLOUDS=[];
for(let i=0;i<6;i++) CLOUDS.push({x:Math.random(),y:rand(.06,.5),r:rand(50,130),sp:rand(.004,.012)});

function pathRound(pts,r){
  ctx.beginPath();
  const n=pts.length;
  for(let i=0;i<n;i++){
    const p=pts[i], q=pts[(i+1)%n];
    const dx=q[0]-p[0], dy=q[1]-p[1], len=Math.hypot(dx,dy)||1;
    const ux=dx/len, uy=dy/len, rr=Math.min(r,len*.4);
    if(i===0) ctx.moveTo(p[0]+ux*rr,p[1]+uy*rr); else ctx.quadraticCurveTo(p[0],p[1],p[0]+ux*rr,p[1]+uy*rr);
    ctx.lineTo(q[0]-ux*rr,q[1]-uy*rr);
  }
  const p0=pts[0],pn=pts[n-1];
  ctx.quadraticCurveTo(p0[0],p0[1],p0[0]+(pts[1][0]-p0[0])*.01,p0[1]+(pts[1][1]-p0[1])*.01);
  ctx.closePath();
}
function quad(a,b,c,d,col){
  ctx.fillStyle=col; ctx.beginPath();
  ctx.moveTo(a[0],a[1]); ctx.lineTo(b[0],b[1]); ctx.lineTo(c[0],c[1]); ctx.lineTo(d[0],d[1]);
  ctx.closePath(); ctx.fill();
}
const mix=(a,b,t)=>[lerp(a[0],b[0],t),lerp(a[1],b[1],t)];

function drawBlockShadow(b){
  const gx=px(b.x,b.z), gy=py(b.x,b.z,0);
  const sc=1+b.yOff/280, al=.22*(1-b.yOff/260);
  if(al<=0) return;
  const rx=b.size*1.55*sc, ry=b.size*.8*sc;
  const g=ctx.createRadialGradient(gx-b.size*.42,gy+b.size*.26,1,gx-b.size*.42,gy+b.size*.26,rx);
  g.addColorStop(0,`rgba(50,50,90,${al})`); g.addColorStop(1,'rgba(50,50,90,0)');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.ellipse(gx-b.size*.42,gy+b.size*.26,rx,ry,0,0,Math.PI*2); ctx.fill();
}

function drawBlock(b){
  const h=BH-b.q, base=b.yOff, topY=base+h;
  const s=b.size, x=b.x, z=b.z;
  if(b.shape==='cyl'){ drawCyl(b,h,base); return; }
  // corners: c1 top, c2 right, c3 bottom(near), c4 left — at top face
  const c1=[px(x+s,z+s),py(x+s,z+s,topY)];
  const c2=[px(x+s,z-s),py(x+s,z-s,topY)];
  const c3=[px(x-s,z-s),py(x-s,z-s,topY)];
  const c4=[px(x-s,z+s),py(x-s,z+s,topY)];
  const dn=topY-base;
  const b2=[c2[0],c2[1]+dn], b3=[c3[0],c3[1]+dn], b4=[c4[0],c4[1]+dn];
  // side faces
  if(b.deco==='stripe'){
    const n=4;
    for(let i=0;i<n;i++){
      const v0=i/n, v1=(i+1)/n, col=i%2?b.stripeB:b.stripeA;
      quad(mix(c2,b2,v0),mix(c3,b3,v0),mix(c3,b3,v1),mix(c2,b2,v1),col);
      const colL=i%2?b.stripeB:b.left;
      quad(mix(c3,b3,v0),mix(c4,b4,v0),mix(c4,b4,v1),mix(c3,b3,v1),colL);
    }
  }else{
    quad(c2,c3,b3,b2,b.right);
    quad(c3,c4,b4,b3,b.left);
  }
  if(b.deco==='rubik'){
    drawGrid(c2,c3,dn,b.cells[1]); drawGridL(c3,c4,dn,b.cells[2]);
  }
  if(b.deco==='gift'){
    quad(mix(c2,c3,.42),mix(c2,c3,.58),mix(b2,b3,.58),mix(b2,b3,.42),b.ribbon);
    quad(mix(c3,c4,.42),mix(c3,c4,.58),mix(b3,b4,.58),mix(b3,b4,.42),b.ribbon);
  }
  // top face
  const g=ctx.createLinearGradient(c4[0],c4[1],c2[0],c2[1]);
  g.addColorStop(0,b.top); g.addColorStop(1,b.topHi);
  ctx.fillStyle=g; pathRound([c1,c2,c3,c4],6); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.lineWidth=1.2; ctx.stroke();
  if(b.deco==='rubik') drawGridTop(c1,c2,c3,c4,b.cells[0]);
  if(b.deco==='gift'){
    const t1=(u,v)=>mix(mix(c3,c2,u),mix(c4,c1,u),v);
    quad(t1(.42,0),t1(.58,0),t1(.58,1),t1(.42,1),b.ribbon);
    quad(t1(0,.42),t1(0,.58),t1(1,.58),t1(1,.42),b.ribbon);
  }
  if(b.deco==='face') drawFace(c2,c3,dn);
}
function drawGridTop(c1,c2,c3,c4,cells){
  const P=(u,v)=>mix(mix(c3,c2,u),mix(c4,c1,u),v);
  for(let i=0;i<3;i++)for(let j=0;j<3;j++){
    const u0=i/3+.03,u1=(i+1)/3-.03,v0=j/3+.03,v1=(j+1)/3-.03;
    quad(P(u0,v0),P(u1,v0),P(u1,v1),P(u0,v1),cells[i*3+j]);
  }
}
function drawGrid(cA,cB,dn,cells){
  const P=(u,v)=>{const m=mix(cA,cB,u);return [m[0],m[1]+v*dn];};
  for(let i=0;i<3;i++)for(let j=0;j<3;j++){
    const u0=i/3+.03,u1=(i+1)/3-.03,v0=j/3+.04,v1=(j+1)/3-.04;
    quad(P(u0,v0),P(u1,v0),P(u1,v1),P(u0,v1),cells[i*3+j]);
  }
}
function drawGridL(cA,cB,dn,cells){
  const P=(u,v)=>{const m=mix(cA,cB,u);return [m[0],m[1]+v*dn];};
  ctx.save(); ctx.globalAlpha=.82;
  for(let i=0;i<3;i++)for(let j=0;j<3;j++){
    const u0=i/3+.03,u1=(i+1)/3-.03,v0=j/3+.04,v1=(j+1)/3-.04;
    quad(P(u0,v0),P(u1,v0),P(u1,v1),P(u0,v1),cells[i*3+j]);
  }
  ctx.restore();
}
function drawFace(c2,c3,dn){
  // cute face on the right side, in face-local (u right, v down) coords
  const o=c2, ux=c3[0]-c2[0], uy=c3[1]-c2[1];
  ctx.save();
  ctx.transform(ux,uy,0,dn,o[0],o[1]);
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.arc(.3,.32,.075,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(.64,.28,.075,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.9)';
  ctx.beginPath(); ctx.arc(.325,.3,.025,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(.665,.26,.025,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,120,140,.6)';
  ctx.beginPath(); ctx.arc(.13,.46,.07,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(.82,.4,.07,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#222'; ctx.lineWidth=.03;
  ctx.beginPath(); ctx.arc(.47,.42,.11,.12*Math.PI,.88*Math.PI); ctx.stroke();
  ctx.restore();
}
function drawCyl(b,h,base){
  const s=b.size, gx=px(b.x,b.z);
  const topCy=py(b.x,b.z,base+h), botCy=py(b.x,b.z,base);
  const rx=s*1.2247, ry=s*.7071;
  // side
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(gx-rx,topCy);
  ctx.lineTo(gx-rx,botCy);
  ctx.ellipse(gx,botCy,rx,ry,0,Math.PI,0,true);
  ctx.lineTo(gx+rx,topCy);
  ctx.closePath();
  const g=ctx.createLinearGradient(gx-rx,0,gx+rx,0);
  g.addColorStop(0,b.left); g.addColorStop(.62,b.right); g.addColorStop(1,b.left);
  ctx.fillStyle=g; ctx.fill();
  if(b.deco==='stripe'){
    ctx.clip();
    const n=4, hh=(botCy+ry)-(topCy);
    for(let i=0;i<n;i++){
      if(i%2===0) continue;
      ctx.fillStyle=b.stripeB; ctx.globalAlpha=.85;
      ctx.fillRect(gx-rx, topCy+hh*i/n, rx*2, hh/n);
    }
    ctx.globalAlpha=1;
  }
  ctx.restore();
  // top
  const gt=ctx.createLinearGradient(gx-rx,topCy,gx+rx,topCy);
  gt.addColorStop(0,b.top); gt.addColorStop(1,b.topHi);
  ctx.fillStyle=gt;
  ctx.beginPath(); ctx.ellipse(gx,topCy,rx,ry,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.lineWidth=1.2; ctx.stroke();
}

function surfaceYAt(x,z){
  if(inside(nextBlock,x,z)&&nextBlock.landed) return BH;
  if(inside(curBlock,x,z)) return BH;
  for(const b of blocks) if(inside(b,x,z)&&b.landed) return BH;
  return 0;
}

function drawPieceShadow(){
  const sy=surfaceYAt(piece.x,piece.z);
  const hgt=Math.max(0,piece.y-sy);
  const al=clamp(.32-hgt*.0012,.06,.32), sc=1+hgt*.0016;
  const gx=px(piece.x,piece.z), gy=py(piece.x,piece.z,sy);
  const g=ctx.createRadialGradient(gx,gy,1,gx,gy,17*sc);
  g.addColorStop(0,`rgba(40,36,70,${al})`); g.addColorStop(1,'rgba(40,36,70,0)');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.ellipse(gx,gy,17*sc,7.5*sc,0,0,Math.PI*2); ctx.fill();
}

function drawPiece(){
  const gx=px(piece.x,piece.z), gy=py(piece.x,piece.z,piece.y);
  ctx.save();
  ctx.translate(gx,gy);
  if(piece.rot){ ctx.translate(0,-26); ctx.rotate(piece.rot); ctx.translate(0,26); }
  ctx.scale(piece.sx,piece.sy);
  // charge glow
  if(state==='charge'&&power>.05){
    const g=ctx.createRadialGradient(0,-20,2,0,-20,40+22*power);
    g.addColorStop(0,`rgba(255,215,120,${.25*power})`); g.addColorStop(1,'rgba(255,215,120,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,-20,40+22*power,0,Math.PI*2); ctx.fill();
  }
  const grad=ctx.createLinearGradient(-14,0,14,0);
  grad.addColorStop(0,'#221d35'); grad.addColorStop(.55,'#3f3763'); grad.addColorStop(1,'#575084');
  // base
  ctx.fillStyle=grad;
  ctx.beginPath(); ctx.ellipse(0,-3,14.5,6,0,0,Math.PI*2); ctx.fill();
  // body
  ctx.beginPath();
  ctx.moveTo(-13,-6);
  ctx.quadraticCurveTo(-11,-20,-4.2,-26);
  ctx.lineTo(4.2,-26);
  ctx.quadraticCurveTo(11,-20,13,-6);
  ctx.quadraticCurveTo(0,-.5,-13,-6);
  ctx.closePath(); ctx.fill();
  // collar
  ctx.beginPath(); ctx.ellipse(0,-26.5,7.4,3.4,0,0,Math.PI*2); ctx.fill();
  // neck
  ctx.beginPath();
  ctx.moveTo(-3.8,-27); ctx.lineTo(-3.1,-34.5); ctx.lineTo(3.1,-34.5); ctx.lineTo(3.8,-27);
  ctx.closePath(); ctx.fill();
  // head
  const hg=ctx.createRadialGradient(3.5,-45.5,1.5,0,-42,12.5);
  hg.addColorStop(0,'#726aad'); hg.addColorStop(.55,'#453c68'); hg.addColorStop(1,'#272040');
  ctx.fillStyle=hg;
  ctx.beginPath(); ctx.arc(0,-42,10.8,0,Math.PI*2); ctx.fill();
  // specular
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.beginPath(); ctx.arc(4,-46,2.1,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function draw(){
  const t=nowS();
  // ---- background
  const [c0,c1]=bgCur;
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,hsl(c0[0],c0[1],c0[2])); g.addColorStop(1,hsl(c1[0],c1[1],c1[2]));
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // light beam
  const lb=ctx.createRadialGradient(W*.78,H*.06,10,W*.78,H*.06,W*.7);
  lb.addColorStop(0,'rgba(255,255,255,.30)'); lb.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=lb; ctx.fillRect(0,0,W,H);
  // clouds
  for(const c of CLOUDS){
    c.x+=c.sp/60; if(c.x>1.25)c.x=-.25;
    const cx=c.x*W, cy=c.y*H;
    const cg=ctx.createRadialGradient(cx,cy,2,cx,cy,c.r);
    cg.addColorStop(0,'rgba(255,255,255,.22)'); cg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=cg;
    ctx.beginPath(); ctx.ellipse(cx,cy,c.r,c.r*.42,0,0,Math.PI*2); ctx.fill();
  }
  // vignette
  const vg=ctx.createRadialGradient(W/2,H*.45,Math.min(W,H)*.4,W/2,H*.5,Math.max(W,H)*.85);
  vg.addColorStop(0,'rgba(60,60,100,0)'); vg.addColorStop(1,'rgba(60,60,100,.14)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

  // ---- world
  ctx.save();
  ctx.translate(W/2,H*.52);
  ctx.scale(ZOOM,ZOOM);
  ctx.translate(-cam.x,-cam.y);

  const sorted=blocks.slice().sort((a,b)=>(b.x+b.z)-(a.x+a.z)); // far (up-screen) first
  for(const b of sorted) drawBlockShadow(b);
  const pd=piece.x+piece.z;
  let pieceDrawn=false;
  for(const b of sorted){
    if(!pieceDrawn && (b.x+b.z) < pd-1){ drawPieceShadow(); drawPiece(); pieceDrawn=true; }
    drawBlock(b);
  }
  if(!pieceDrawn){ drawPieceShadow(); drawPiece(); }

  // rings (perfect landing)
  for(const r of rings){
    const rt=(t-r.t0)/.55, rr=r.s*(0.6+1.6*rt);
    ctx.strokeStyle=`rgba(255,205,90,${.7*(1-rt)})`; ctx.lineWidth=3*(1-rt)+1;
    ctx.beginPath(); ctx.ellipse(px(r.x,r.z),py(r.x,r.z,r.y),rr*1.2247,rr*.7071,0,0,Math.PI*2); ctx.stroke();
  }
  // particles
  for(const p of particles){
    const a=1-(t-p.t0)/p.life;
    ctx.fillStyle=`rgba(${p.rgb},${(a*.9).toFixed(3)})`;
    ctx.beginPath(); ctx.arc(px(p.x,p.z),py(p.x,p.z,p.y),p.r,0,Math.PI*2); ctx.fill();
  }
  // floating texts
  for(const tx of texts){
    const a=1-(t-tx.t0);
    const yy=tx.y+(t-tx.t0)*46;
    ctx.font=`800 ${tx.size}px -apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif`;
    ctx.textAlign='center';
    ctx.lineWidth=4; ctx.strokeStyle=`rgba(255,255,255,${(a*.85).toFixed(3)})`;
    ctx.strokeText(tx.txt,px(tx.x,tx.z),py(tx.x,tx.z,yy));
    ctx.fillStyle=tx.col;
    ctx.globalAlpha=Math.max(0,a);
    ctx.fillText(tx.txt,px(tx.x,tx.z),py(tx.x,tx.z,yy));
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

function frame(){
  update();
  draw();
  requestAnimationFrame(frame);
}

//==================================================================
//  INPUT / UI
//==================================================================
cv.addEventListener('pointerdown',e=>{ e.preventDefault(); startCharge(); });
window.addEventListener('pointerup',()=>releaseJump());
window.addEventListener('pointercancel',()=>releaseJump());
window.addEventListener('keydown',e=>{
  if(e.code==='Space'&&!e.repeat){ e.preventDefault(); startCharge(); }
});
window.addEventListener('keyup',e=>{ if(e.code==='Space') releaseJump(); });
window.addEventListener('contextmenu',e=>e.preventDefault());

$('playBtn').addEventListener('click',()=>{
  audioInit();
  if(AU.ctx&&AU.ctx.state==='suspended') AU.ctx.resume();
  musicStart(); SFX.click();
  $('startScreen').classList.add('hidden');
  $('hud').classList.remove('hidden');
  resetWorld();
  state='play';
});
$('retryBtn').addEventListener('click',()=>{
  SFX.click();
  $('endScreen').classList.add('hidden');
  $('hint').classList.add('hidden');
  resetWorld();
  state='play';
});
$('muteBtn').addEventListener('click',e=>{ e.stopPropagation(); setMuted(!AU.muted); });
$('muteBtn').addEventListener('pointerdown',e=>e.stopPropagation());

// menu backdrop world
resetWorld();
updateHud();
frame();

// small debug handle (harmless, aids testing)
window.__jj = {
  get state(){return state;}, get score(){return score;},
  get piece(){return piece;}, get cur(){return curBlock;}, get next(){return nextBlock;},
  CHARGE_TIME, D_MIN, D_MAX,
};
})();
