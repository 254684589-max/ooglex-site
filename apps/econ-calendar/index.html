<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root { --bg:#0a0b10; --panel:#151823; --line:rgba(255,255,255,0.09); --text:#eef1f7; --dim:#9099ad;
    --hot:#e0729a; --high:#ff5d6c; --med:#e8a33d; --low:#9099ad; --hol:#8aa6ff; --act:#28c79a; }
  body { min-height:100vh; color:var(--text);
    background:radial-gradient(900px 460px at 50% -10%, rgba(224,114,154,.12), transparent 60%), var(--bg);
    background-attachment:fixed;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif; line-height:1.5; }
  .page { max-width:1000px; margin:0 auto; padding:14px 16px 64px; }
  .head { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  .head a.back { color:var(--hot); text-decoration:none; font-size:0.9rem; }
  .head a.back:hover { opacity:.8; }

  .title { margin:8px 0 4px; }
  .title h1 { font-size:1.85rem; font-weight:900; letter-spacing:.5px; }
  .title h1 .b { background:var(--hot); color:#1a0610; padding:0 8px; border-radius:5px; margin-right:8px; }
  .title p { color:var(--dim); font-size:0.84rem; margin-top:5px; }
  .statusrow { display:flex; gap:9px; margin-top:9px; flex-wrap:wrap; align-items:center; }
  .status { display:inline-flex; align-items:center; gap:6px; font-size:0.78rem; padding:4px 12px; border-radius:999px; border:1px solid var(--line); }
  .status .sdot { width:7px; height:7px; border-radius:50%; }
  .status.live { color:#3fd08a; } .status.live .sdot { background:#3fd08a; animation:pulse 1.9s infinite; }
  .status.demo { color:var(--med); } .status.demo .sdot { background:var(--med); }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(63,208,138,.5)} 70%{box-shadow:0 0 0 7px rgba(63,208,138,0)} 100%{box-shadow:0 0 0 0 rgba(63,208,138,0)} }
  .weekinfo { font-size:0.82rem; color:var(--dim); }

  .tabs { display:flex; gap:8px; margin:14px 0; flex-wrap:wrap; }
  .tabs button { padding:8px 15px; border-radius:999px; cursor:pointer; font-family:inherit; font-size:0.88rem;
    color:var(--dim); background:var(--panel); border:1px solid var(--line); transition:all .18s; }
  .tabs button:hover { color:var(--text); }
  .tabs button.on { color:#1a0610; font-weight:800; background:var(--hot); border-color:transparent; }

  .day { margin-bottom:18px; }
  .day .dh { font-size:0.86rem; font-weight:800; color:var(--text); padding:6px 2px; margin-bottom:6px;
    border-bottom:1px solid var(--line); position:sticky; top:0; background:linear-gradient(180deg,var(--bg),rgba(10,11,16,.86)); backdrop-filter:blur(4px); z-index:2; }
  .day.today .dh { color:var(--hot); }

  .ev { display:grid; grid-template-columns:54px 116px 12px 1fr auto; align-items:center; gap:10px;
    padding:10px 8px; border-radius:10px; border:1px solid transparent; animation:fade .35s both; }
  .ev:hover { background:var(--panel); border-color:var(--line); }
  @keyframes fade { from{opacity:0} to{opacity:1} }
  .ev .tm { font-variant-numeric:tabular-nums; font-weight:700; font-size:0.9rem; color:var(--dim); }
  .ev .cy { font-size:0.86rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ev .cy span { color:var(--dim); }
  .ev .imp { width:9px; height:9px; border-radius:50%; justify-self:center; }
  .ev .nm .t { font-weight:700; font-size:0.92rem; line-height:1.3; }
  .ev .nm .en { color:var(--dim); font-size:0.72rem; margin-top:1px; }
  .ev .vals { display:flex; gap:14px; justify-content:flex-end; }
  .cell { display:flex; flex-direction:column; align-items:flex-end; min-width:52px; }
  .cell .cl { color:var(--dim); font-size:0.66rem; }
  .cell .cv { font-weight:700; font-size:0.9rem; font-variant-numeric:tabular-nums; }
  .cell.act .cv { color:var(--act); }
  .empty { text-align:center; color:var(--dim); padding:50px 0; }

  .legend { display:flex; gap:14px; flex-wrap:wrap; color:var(--dim); font-size:0.74rem; margin:2px 2px 10px; }
  .legend span { display:inline-flex; align-items:center; gap:5px; }
  .legend i { width:8px; height:8px; border-radius:50%; display:inline-block; }

  .nextbar { display:flex; align-items:center; gap:9px; flex-wrap:wrap; margin:2px 0 14px; padding:10px 13px;
    border:1px solid var(--line); border-radius:12px; background:var(--panel);
    box-shadow:inset 3px 0 0 var(--hot); font-size:0.88rem; }
  .nextbar .lab { color:var(--hot); font-weight:800; white-space:nowrap; }
  .nextbar .dot { width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
  .nextbar .ev2 { font-weight:700; }
  .nextbar .ev2 .cy2 { color:var(--dim); font-weight:600; }
  .nextbar .when { color:var(--dim); margin-left:auto; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .nextbar .when b { color:var(--text); }

  footer { margin-top:22px; text-align:center; color:var(--dim); font-size:0.78rem; line-height:1.8; }
  @media (max-width:560px){
    .title h1 { font-size:1.45rem; }
    .ev { grid-template-columns:48px 1fr; grid-template-areas:"tm nm" "tm vals"; row-gap:6px; }
    .ev .tm { grid-area:tm; align-self:start; }
    .ev .cy { display:none; }
    .ev .imp { display:none; }
    .ev .nm { grid-area:nm; }
    .ev .vals { grid-area:vals; justify-content:flex-start; gap:18px; }
    .cell { align-items:flex-start; }
  }
</style>
