<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:#0b0e15; --card:#161922; --line:rgba(255,255,255,0.09);
    --text:#eef2f8; --dim:#9aa3b6; --brand:#38bdf8; --brand2:#6366f1;
    --up:#ff5d6c; --down:#28c79a; --track:rgba(255,255,255,0.05);
  }
  body {
    min-height:100vh; color:var(--text);
    background:
      radial-gradient(820px 420px at 10% -8%, rgba(56,189,248,0.16), transparent 60%),
      radial-gradient(720px 400px at 92% 2%, rgba(99,102,241,0.16), transparent 60%),
      radial-gradient(900px 600px at 50% 118%, rgba(56,189,248,0.06), transparent 60%),
      var(--bg);
    background-attachment:fixed;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
    line-height:1.55; overflow-x:hidden;
  }
  .page { max-width:820px; margin:0 auto; padding:18px 16px 72px; }

  header { display:flex; align-items:center; margin-bottom:14px; }
  header a { color:var(--brand); text-decoration:none; font-size:0.95rem; transition:opacity .2s; }
  header a:hover { opacity:.75; }

  .title { text-align:center; margin-bottom:18px; }
  .title h1 {
    font-size:1.95rem; letter-spacing:1px; font-weight:800;
    background:linear-gradient(92deg,#9fe2ff,#38bdf8 45%,#6366f1);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .title p { color:var(--dim); margin-top:6px; font-size:0.9rem; }
  .statusrow { display:flex; justify-content:center; gap:9px; margin-top:10px; flex-wrap:wrap; }
  .status { display:inline-flex; align-items:center; gap:7px; font-size:0.78rem; padding:4px 13px;
    border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,0.03); }
  .status .sdot { width:8px; height:8px; border-radius:50%; flex:none; }
  .status.live { color:var(--brand); } .status.live .sdot { background:var(--brand); animation:pulse 1.9s infinite; }
  .status.demo { color:#7fd0ff; } .status.demo .sdot { background:#4a93c4; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(56,189,248,.5);} 70%{box-shadow:0 0 0 7px rgba(56,189,248,0);} 100%{box-shadow:0 0 0 0 rgba(56,189,248,0);} }

  .summary { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:14px; }
  .summary span { font-size:0.82rem; padding:5px 13px; border-radius:999px;
    background:var(--card); border:1px solid var(--line); white-space:nowrap; }
  .summary .pill-i { color:var(--dim); }
  .summary .big { color:var(--brand); font-weight:700; }
  .summary .lead.up { color:var(--up); border-color:rgba(255,93,108,.35); }
  .summary .lead.down { color:var(--down); border-color:rgba(40,199,154,.35); }

  .controls { display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }
  .seg { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
  .seg button { padding:7px 15px; border-radius:999px; cursor:pointer; font-family:inherit;
    font-size:0.88rem; color:var(--dim); background:var(--card); border:1px solid var(--line); transition:all .18s; }
  .seg button:hover { color:var(--text); border-color:var(--brand); }
  .seg button.on { color:#06121f; border-color:transparent; font-weight:700;
    background:linear-gradient(135deg,var(--brand),var(--brand2)); box-shadow:0 8px 20px -8px rgba(56,189,248,.7); }
  .search { display:flex; justify-content:center; }
  .search input { width:100%; max-width:340px; padding:9px 15px; border-radius:999px; font-family:inherit;
    font-size:0.9rem; color:var(--text); background:var(--card); border:1px solid var(--line); }
  .search input:focus { outline:none; border-color:var(--brand); }

  #list { display:flex; flex-direction:column; gap:9px; }
  .rowcard {
    display:grid; grid-template-columns:30px 44px 1fr auto; align-items:center; gap:11px;
    padding:11px 14px; border-radius:14px; position:relative; overflow:hidden;
    background:linear-gradient(180deg, rgba(22,25,34,.94), rgba(16,19,27,.94));
    border:1px solid var(--line); box-shadow:0 16px 40px -30px rgba(0,0,0,.85), inset 0 1px 0 rgba(255,255,255,.04);
    animation:rowIn .4s cubic-bezier(.22,.61,.36,1) both; transition:border-color .15s, transform .15s;
  }
  .rowcard:hover { border-color:rgba(56,189,248,.4); transform:translateY(-1px); }
  @keyframes rowIn { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }
  .rowcard .wbarbg { position:absolute; left:0; bottom:0; height:3px; width:100%; background:var(--track); }
  .rowcard .wbar { position:absolute; left:0; bottom:0; height:3px; border-radius:0 2px 2px 0;
    background:linear-gradient(90deg,var(--brand2),var(--brand)); box-shadow:0 0 8px rgba(56,189,248,.5);
    transition:width .6s cubic-bezier(.22,.61,.36,1); }

  .rk { font-size:1.05rem; font-weight:800; color:var(--dim); text-align:center; font-variant-numeric:tabular-nums; }
  .rk.top { color:var(--brand); }
  .logo { width:44px; height:44px; border-radius:12px; overflow:hidden; flex:none;
    border:1px solid var(--line); background:#fff; display:flex; align-items:center; justify-content:center; }
  .logo img { width:100%; height:100%; object-fit:contain; display:block; padding:5px; background:#fff; }
  .logo .ini { width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    font-weight:800; color:#06121f; font-size:1.15rem; background:linear-gradient(135deg,var(--brand),var(--brand2)); }
  .info { min-width:0; }
  .nm { font-size:1rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .nm .en { color:var(--dim); font-weight:400; font-size:0.78rem; margin-left:6px; }
  .nm .pri { display:inline-block; margin-left:7px; padding:0 7px; border-radius:999px; font-size:0.66rem;
    font-weight:700; vertical-align:middle; color:#ffcf8e; background:rgba(232,160,58,.15); border:1px solid rgba(232,160,58,.45); }
  .meta { color:var(--dim); font-size:0.78rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
  .money { text-align:right; white-space:nowrap; }
  .cap { font-size:1.12rem; font-weight:800; font-variant-numeric:tabular-nums; }
  .px { font-size:0.76rem; color:var(--dim); font-variant-numeric:tabular-nums; margin-top:1px; }
  .px .chg { font-weight:700; margin-left:5px; }
  .chg.up { color:var(--up); } .chg.down { color:var(--down); } .chg.flat { color:var(--dim); }

  .divider { display:flex; align-items:center; gap:12px; margin:18px 4px 6px; color:#ffcf8e; font-size:0.8rem; font-weight:600; }
  .divider span { white-space:nowrap; }
  .divider::before, .divider::after { content:""; height:1px; flex:1; background:linear-gradient(90deg,transparent,rgba(232,160,58,.5),transparent); }

  .empty { text-align:center; color:var(--dim); padding:44px 0; font-size:0.92rem; }
  footer { margin-top:20px; text-align:center; color:var(--dim); font-size:0.8rem; line-height:1.85; }
  footer .src b { color:var(--text); font-weight:600; }

  @media (max-width:600px) {
    .title h1 { font-size:1.5rem; }
    .rowcard { grid-template-columns:24px 38px 1fr auto; gap:9px; padding:10px 11px; }
    .logo { width:38px; height:38px; border-radius:10px; }
    .nm .en { display:none; }
    .cap { font-size:1rem; }
  }
</style>
