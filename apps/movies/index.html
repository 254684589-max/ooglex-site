  .status { display:inline-flex; align-items:center; gap:6px; font-size:0.78rem; padding:4px 12px; border-radius:999px; border:1px solid var(--line); }
  .status .sdot { width:7px; height:7px; border-radius:50%; }
  .status.live { color:#3fd08a; } .status.live .sdot { background:#3fd08a; animation:pulse 1.9s infinite; }
  .status.demo { color:var(--gold); } .status.demo .sdot { background:var(--gold); }

  .tabs button.on { color:#1a1500; font-weight:800; background:var(--gold); border-color:transparent; }

  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(146px,1fr)); gap:14px; }
  .movie { position:relative; border-radius:12px; overflow:hidden; text-decoration:none; color:inherit;

  .movie:hover { transform:translateY(-4px); border-color:var(--gold); }
  @keyframes fade { from{opacity:0} to{opacity:1} }
  .poster { position:relative; aspect-ratio:2/3; background:linear-gradient(160deg,#2a2a30,#15151a); }
  .poster img { width:100%; height:100%; object-fit:cover; display:block; }
  .poster .ph { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center;

  .rk { position:absolute; top:7px; left:7px; background:rgba(0,0,0,.82); color:var(--gold); font-weight:900;

  .rate { position:absolute; bottom:7px; left:7px; background:rgba(0,0,0,.82); color:var(--gold); font-weight:800;
