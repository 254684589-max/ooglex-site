  .page { max-width:680px; margin:0 auto; padding:18px 16px 72px; }

  .status .sdot { width:8px; height:8px; border-radius:50%; }
  .status.live { color:#7fe3e8; } .status.live .sdot { background:var(--accent); animation:pulse 1.9s infinite; }
  .status.demo { color:#f4c66e; } .status.demo .sdot { background:#caa64a; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(57,194,201,.5);} 70%{box-shadow:0 0 0 7px rgba(57,194,201,0);} 100%{box-shadow:0 0 0 0 rgba(57,194,201,0);} }

  .glass { background:linear-gradient(180deg, rgba(24,28,38,.94), rgba(18,21,29,.94));

  .gauge { width:100%; max-width:360px; height:auto; display:block; margin:0 auto; }
  .gauge .tick { fill:var(--dim); font-size:12px; }
  .gauge .needle { filter:drop-shadow(0 2px 4px rgba(0,0,0,.5)); }
  .reading { margin-top:-6px; }
  .reading .num { font-size:3.2rem; font-weight:800; line-height:1; font-variant-numeric:tabular-nums; }
  .reading .lab { font-size:1.1rem; font-weight:700; letter-spacing:2px; margin-top:2px; }
  .reading .sub { color:var(--dim); font-size:0.82rem; margin-top:4px; }

  .refs { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; }
  .ref { padding:10px 6px; border-radius:13px; text-align:center; background:var(--card); border:1px solid var(--line); }
  .ref .k { color:var(--dim); font-size:0.74rem; }
  .ref .v { font-size:1.5rem; font-weight:800; font-variant-numeric:tabular-nums; line-height:1.2; }
  .ref .r { font-size:0.72rem; font-weight:600; }

  .sec-h { font-size:0.92rem; color:var(--dim); margin:4px 2px 9px; letter-spacing:1px; }
  .histcard { padding:14px 14px 10px; margin-bottom:14px; }
  .spark { width:100%; height:auto; display:block; }

  .indcard { padding:6px 14px; margin-bottom:14px; }
  .ind { padding:11px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
  .ind:last-child { border-bottom:none; }
  .ind .top { display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
  .ind .nm { font-weight:700; font-size:0.95rem; }
  .ind .nm small { color:var(--dim); font-weight:400; font-size:0.74rem; margin-left:6px; }
  .ind .rt { font-size:0.82rem; font-weight:700; white-space:nowrap; }
  .ind .barwrap { position:relative; height:8px; border-radius:6px; margin-top:9px;

  .ind .mk { position:absolute; top:50%; width:14px; height:14px; border-radius:50%; background:#fff;
    border:2px solid #0b0e14; transform:translate(-50%,-50%); box-shadow:0 1px 4px rgba(0,0,0,.6);
    transition:left .6s cubic-bezier(.22,.61,.36,1); }

  footer { margin-top:18px; text-align:center; color:var(--dim); font-size:0.8rem; line-height:1.85; }
  footer .src b { color:var(--text); font-weight:600; }
  .empty { text-align:center; color:var(--dim); padding:40px 0; }

  @media (max-width:480px) {
    .title h1 { font-size:1.5rem; }
    .reading .num { font-size:2.6rem; }
    .ref .v { font-size:1.25rem; }
  }
