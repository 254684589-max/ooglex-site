<html lang="zh-CN">
<head>
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">

<title>万象智聊 · AI 对话站</title>
<meta name="description" content="连接国内外大模型的轻量聊天站：自带密钥、本地保存、流式对话">

<meta property="og:type" content="website">
<meta property="og:title" content="万象智聊 · AI 对话站">
<meta property="og:description" content="连接国内外大模型的轻量聊天站：自带密钥、本地保存、流式对话">
<meta property="og:url" content="https://www.ooglex.com/apps/ai-chat/">
<meta property="og:image" content="https://www.ooglex.com/assets/og-cover.png">
<meta name="twitter:card" content="summary_large_image">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:#0d1020; --panel:#161a2e; --line:rgba(140,160,255,0.18);
    --text:#e8eaf6; --dim:#9aa3c0; --blue:#6c8cff; --purple:#9d6cff; --green:#4dd9a0;
  }
  body {
    height:100vh; height:100dvh; display:flex; flex-direction:column; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  }
  header {
    display:flex; align-items:center; gap:12px;
    padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
    background:rgba(13,16,32,0.9); border-bottom:1px solid var(--line); flex-shrink:0;
  }
  header a { color:var(--blue); text-decoration:none; font-size:0.9rem; white-space:nowrap; }
  header h1 {
    flex:1; text-align:center; font-size:1.1rem; letter-spacing:2px;
    background:linear-gradient(90deg,var(--blue),var(--purple));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .hbtn {
    background:rgba(255,255,255,0.06); border:1px solid var(--line); color:var(--dim);
    border-radius:8px; padding:7px 12px; cursor:pointer; font-family:inherit; font-size:0.85rem;
  }
  .hbtn:hover { color:var(--text); border-color:var(--blue); }
  #status { font-size:0.78rem; color:var(--dim); text-align:center; padding:4px; flex-shrink:0; }
  #status .ok { color:var(--green); }

  #chat { flex:1; overflow-y:auto; padding:18px 14px 10px; }
  .inner { max-width:760px; margin:0 auto; }
  .msg { display:flex; gap:10px; margin-bottom:16px; }
  .msg .av {
    width:36px; height:36px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:1.1rem;
  }
  .msg.user { flex-direction:row-reverse; }
  .msg.user .av { background:linear-gradient(135deg,#2e8a6e,#3aa8c8); }
  .msg.ai .av { background:linear-gradient(135deg,var(--blue),var(--purple)); }
  .grp { max-width:82%; min-width:0; display:flex; flex-direction:column; align-items:flex-start; }
  .msg.user .grp { align-items:flex-end; }
  .bubble {
    max-width:100%; padding:12px 16px; border-radius:14px; line-height:1.8;
    font-size:0.98rem; word-break:break-word; min-width:0;
  }
  .acts { display:flex; gap:4px; margin-top:4px; opacity:0.55; transition:opacity 0.15s; }
  .msg:hover .acts { opacity:1; }
  .act {
    border:none; background:none; color:var(--dim); cursor:pointer;
    font-family:inherit; font-size:0.78rem; padding:3px 8px; border-radius:7px;
  }
  .act:hover { color:var(--text); background:rgba(255,255,255,0.07); }
  .msg.user .bubble { background:rgba(108,140,255,0.18); border:1px solid rgba(108,140,255,0.3); white-space:pre-wrap; }
  .msg.ai .bubble { background:var(--panel); border:1px solid var(--line); }
  /* Markdown 块级元素 */
  .bubble p { margin:0.4em 0; }
  .bubble p:first-child, .bubble > :first-child { margin-top:0; }
  .bubble p:last-child, .bubble > :last-child { margin-bottom:0; }
  .bubble h1, .bubble h2, .bubble h3, .bubble h4 { margin:0.8em 0 0.4em; line-height:1.4; color:var(--text); }
  .bubble h1 { font-size:1.2em; } .bubble h2 { font-size:1.12em; }
  .bubble h3 { font-size:1.05em; } .bubble h4 { font-size:1em; color:var(--dim); }
  .bubble ul, .bubble ol { margin:0.4em 0; padding-left:1.5em; }
  .bubble li { margin:0.18em 0; }
  .bubble blockquote {
    border-left:3px solid var(--blue); margin:0.5em 0; padding:0.25em 0.9em;
    color:var(--dim); background:rgba(108,140,255,0.07); border-radius:0 8px 8px 0;
  }
  .bubble a { color:var(--blue); text-decoration:underline; text-underline-offset:3px; }
  .bubble hr { border:none; border-top:1px solid var(--line); margin:0.8em 0; }
  .bubble .tbl { overflow-x:auto; margin:0.5em 0; }
  .bubble table { border-collapse:collapse; font-size:0.92em; min-width:60%; }
  .bubble th, .bubble td { border:1px solid var(--line); padding:6px 12px; text-align:left; }
  .bubble th { background:rgba(108,140,255,0.12); font-weight:600; }
  .bubble tr:nth-child(even) td { background:rgba(255,255,255,0.025); }
  .bubble code {
    background:rgba(0,0,0,0.4); padding:2px 6px; border-radius:5px;
    font-family:ui-monospace,Consolas,monospace; font-size:0.88em;
  }
  .bubble pre {
    background:rgba(0,0,0,0.45); border:1px solid var(--line); border-radius:8px;
    padding:10px 12px; overflow-x:auto; margin:8px 0; white-space:pre;
  }
  .bubble pre code { background:none; padding:0; }
  .cursor::after { content:'▍'; animation:blink 0.9s infinite; color:var(--blue); }
  @keyframes blink { 50% { opacity:0; } }

  #inputBar {
    flex-shrink:0; padding:12px 14px calc(16px + env(safe-area-inset-bottom));
    background:rgba(13,16,32,0.95); border-top:1px solid var(--line);
  }
  #inputBar .inner { display:flex; gap:10px; }
  #inp {
    flex:1; resize:none; max-height:120px; padding:12px 14px; border-radius:12px;
    background:var(--panel); border:1px solid var(--line); color:var(--text);
    font-size:1rem; font-family:inherit; line-height:1.5;
  }
  #inp:focus { outline:none; border-color:var(--blue); }
  #sendBtn {
    width:84px; flex-shrink:0; white-space:nowrap;
    border:none; border-radius:12px; cursor:pointer; font-family:inherit;
    background:linear-gradient(135deg,var(--blue),var(--purple)); color:#fff; font-size:1rem;
    letter-spacing:2px; transition:opacity .2s;
  }
  @media (max-width:480px) { #sendBtn { width:64px; letter-spacing:1px; } }
  #sendBtn:disabled { opacity:0.5; cursor:default; }
  #sendBtn.stop { background:linear-gradient(135deg,#b03a2e,#e0796a); }

  /* 全局音乐悬浮钮（assets/ambient.js 注入）默认在右下角，会压住发送按钮：抬到输入栏上方 */
  #music-toggle.amb-float { bottom:calc(96px + env(safe-area-inset-bottom)) !important; }

  /* 会话抽屉 */
  #drawerMask {
    position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:19; display:none;
  }
  #drawerMask.show { display:block; }
  #drawer {
    position:fixed; top:0; left:0; bottom:0; width:272px; max-width:80vw; z-index:20;
    background:var(--panel); border-right:1px solid var(--line);
    transform:translateX(-105%); transition:transform 0.25s ease;
    display:flex; flex-direction:column;
    padding:calc(14px + env(safe-area-inset-top)) 12px calc(14px + env(safe-area-inset-bottom));
  }
  #drawer.open { transform:none; }
  #newConvBtn {
    flex-shrink:0; padding:12px; border:none; border-radius:10px; cursor:pointer;
    background:linear-gradient(135deg,var(--blue),var(--purple)); color:#fff;
    font-family:inherit; font-size:0.95rem; letter-spacing:1px;
  }
  #convList { flex:1; overflow-y:auto; margin-top:12px; }
  .conv {
    display:flex; align-items:center; gap:6px; padding:10px 8px 10px 12px;
    border-radius:10px; cursor:pointer; color:var(--dim);
    border:1px solid transparent; margin-bottom:4px;
  }
  .conv:hover { color:var(--text); background:rgba(255,255,255,0.04); }
  .conv.cur { background:rgba(108,140,255,0.12); border-color:rgba(108,140,255,0.3); color:var(--text); }
  .conv .t { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:0.92rem; }
  .conv .del {
    flex-shrink:0; border:none; background:none; color:inherit; cursor:pointer;
    font-size:0.95rem; padding:2px 6px; opacity:0.45; border-radius:6px;
  }
  .conv .del:hover { opacity:1; color:#e0796a; }

  /* 设置面板 */
  #mask {
    position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none;
    align-items:center; justify-content:center; z-index:10; padding:16px;
  }
  #mask.show { display:flex; }
  #setPanel {
    background:var(--panel); border:1px solid var(--line); border-radius:16px;
    width:100%; max-width:520px; max-height:88vh; overflow-y:auto; padding:24px;
  }
  #setPanel h2 { color:var(--blue); letter-spacing:2px; margin-bottom:6px; }
  #setPanel .tip { color:var(--dim); font-size:0.85rem; line-height:1.7; margin-bottom:14px; }
  #setPanel label { display:block; color:var(--dim); margin:13px 0 5px; font-size:0.9rem; }
  #setPanel input, #setPanel select, #setPanel textarea {
    width:100%; padding:10px 12px; border-radius:9px; font-size:0.95rem;
    background:rgba(8,10,22,0.7); border:1px solid var(--line); color:var(--text); font-family:inherit;
  }
  #setPanel textarea { resize:vertical; min-height:60px; }
  #setPanel .btns { display:flex; gap:10px; margin-top:20px; }
  #setPanel .btns button {
    flex:1; padding:12px; border-radius:10px; border:none; cursor:pointer;
    font-family:inherit; font-size:1rem; letter-spacing:2px;
  }
  #saveBtn { background:linear-gradient(135deg,var(--blue),var(--purple)); color:#fff; }
  #cancelBtn { background:rgba(255,255,255,0.08); color:var(--dim); }
  .keyhelp { font-size:0.82rem; color:var(--dim); line-height:1.8; margin-top:10px; }
  .keyhelp a { color:var(--blue); }
  .safe {
    background:rgba(77,217,160,0.08); border:1px solid rgba(77,217,160,0.35); color:var(--green);
    border-radius:9px; padding:9px 12px; font-size:0.83rem; margin-top:12px; line-height:1.6;
  }
</style>

</head>
<body>
<header>
  <a href="../../">← <span class="ogx-wm" style="font-weight:700"><span style="color:#22d3ee">O</span><span style="color:#4aa8ff">o</span><span style="color:#6c8cff">g</span><span style="color:#9d6cff">l</span><span style="color:#c86cff">e</span><span style="color:#f472b6">x</span></span></a>
  <h1>✨ 万象智聊</h1>
  <button class="hbtn" id="convBtn">💬 对话</button>
  <button class="hbtn" id="setBtn">⚙️ 设置</button>
</header>
<div id="status"></div>
<div id="chat"><div class="inner" id="msgs"></div></div>
<div id="inputBar">
  <div class="inner">
    <textarea id="inp" rows="1" placeholder="输入你的问题…（Enter 发送，Shift+Enter 换行）"></textarea>
    <button id="sendBtn">发送</button>
  </div>
</div>

<div id="drawerMask"></div>
<aside id="drawer">
  <button id="newConvBtn">＋ 新对话</button>
  <div id="convList"></div>
</aside>

<div id="mask">
  <div id="setPanel">
    <h2>⚙️ 连接大模型</h2>
    <p class="tip">选择一个服务商，填入你自己申请的 API 密钥即可对话。国内服务商无需特殊网络，注册就送免费额度，几分钟搞定。</p>
    <label>服务商</label>
    <select id="cfgProvider"></select>
    <label>接口地址（Base URL）</label>
    <input id="cfgBase" type="text">
    <label>模型名称</label>
    <input id="cfgModel" type="text">
    <label>API 密钥（仅保存在你自己的浏览器里）</label>
    <input id="cfgKey" type="password" placeholder="sk-…">
    <label>AI 人设（系统提示词，可自由修改）</label>
    <textarea id="cfgSys"></textarea>
    <div class="safe">🔒 密钥只存于本机浏览器 localStorage，本站没有服务器，不会也无法上传你的密钥。代码开源可查。</div>
    <div class="keyhelp" id="keyHelp"></div>
    <div class="btns">
      <button id="cancelBtn">取消</button>
      <button id="saveBtn">保存并开聊</button>
    </div>
  </div>
</div>
<script src="app.js"></script>
  <script src="../../assets/particles.js"></script>
  <script src="../../assets/ambient.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js', { scope: './' }).catch(function(){});
    });
  }
</script>
</body>
</html>
