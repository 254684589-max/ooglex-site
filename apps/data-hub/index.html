<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:#0b0a10; --ink:#f3f0ea; --dim:#9a94a6; --faint:#645f70;
    --gold:#d9b779; --up:#e2606a; --down:#4bbf9a;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
  }
  body {
    min-height:100vh; color:var(--ink);
    background:
      radial-gradient(820px 460px at 88% -6%, rgba(217,183,121,.12), transparent 60%),
      radial-gradient(700px 500px at 6% 108%, rgba(120,110,150,.10), transparent 60%),
      var(--bg);
    background-attachment:fixed;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
    line-height:1.55; overflow-x:hidden;
  }
  .page { max-width:1000px; margin:0 auto; padding:16px 20px 64px; }

  header.top { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  header.top a.back { color:var(--gold); text-decoration:none; font-size:0.9rem; }
  header.top a.back:hover { opacity:.8; }

  /* ── masthead ── */
  .masthead { border-bottom:1px solid rgba(217,183,121,.28); padding:20px 0 24px; margin:8px 0 30px; }
  .kick { font-family:var(--mono); font-size:0.72rem; letter-spacing:0.32em; text-transform:uppercase; color:var(--gold); }
  .masthead h1 { margin:14px 0 0; font-size:clamp(2rem,5.2vw,3.1rem); font-weight:300; letter-spacing:2px;
    line-height:1.06; text-wrap:balance; }
  .masthead h1 b { font-weight:700; }
  .masthead .date { font-family:var(--mono); font-size:0.74rem; color:var(--faint); margin-top:14px; letter-spacing:0.05em; }

  /* ── featured lead (今日市场总览 as editorial feature) ── */
  .lead { display:none; }
  .lead.show { display:grid; grid-template-columns:1.1fr .9fr; gap:40px; align-items:center;
    padding-bottom:34px; margin-bottom:8px; border-bottom:1px solid rgba(255,255,255,.10); }
  .lead .hn { font-family:var(--mono); font-size:0.68rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--dim); }
  .lead .num { font-weight:200; font-size:clamp(3.4rem,9vw,5.6rem); line-height:.92; letter-spacing:-.01em;
    margin:10px 0 8px; font-variant-numeric:tabular-nums; color:var(--gold); }
  .lead .cap { color:var(--dim); font-size:1.02rem; max-width:38ch; line-height:1.7; }
  .lead .cap b { color:var(--ink); font-weight:600; }
  .lead .cap b.up { color:var(--up); } .lead .cap b.down { color:var(--down); }
  .lead .side .sr { display:flex; align-items:baseline; justify-content:space-between; gap:16px;
    padding:14px 0; border-top:1px solid rgba(255,255,255,.09); }
  .lead .side .sr:first-child { border-top:0; }
  .lead .side .sr .sk { color:var(--dim); font-size:0.86rem; }
  .lead .side .sr .sk em { display:block; font-style:normal; color:var(--faint); font-size:0.74rem; margin-top:2px; }
  .lead .side .sr .sv { font-family:var(--mono); font-size:1.3rem; font-weight:500; letter-spacing:-.01em;
    font-variant-numeric:tabular-nums; white-space:nowrap; }

  /* ── editorial card grid ── */
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(min(280px,100%),1fr)); gap:0 44px; margin-top:20px; }
  .art { display:block; text-decoration:none; color:inherit; padding:24px 0 26px;
    border-top:1px solid rgba(255,255,255,.10); transition:opacity .15s; }
  .art:hover { opacity:.92; }
  .art:hover .hn .t { color:var(--gold); }
  .art:focus-visible { outline:2px solid var(--gold); outline-offset:4px; }
  .art .hn { display:flex; align-items:baseline; gap:10px; }
  .art .hn .t { font-size:1.05rem; font-weight:600; letter-spacing:0.02em; transition:color .15s; }
  .art .hn .tag { margin-left:auto; font-family:var(--mono); font-size:0.64rem; letter-spacing:0.08em;
    color:var(--faint); text-transform:uppercase; white-space:nowrap; }
  .art .body { margin-top:2px; }
  .art .big { font-weight:200; font-size:2.8rem; line-height:1.02; letter-spacing:-.01em; margin:12px 0 2px;
    font-variant-numeric:tabular-nums; }
  .art .big small { font-size:0.8rem; font-weight:500; color:var(--dim); margin-left:9px; letter-spacing:0; }
  .art .row { display:flex; align-items:baseline; justify-content:space-between; gap:12px; padding:9px 0;
    border-top:1px dotted rgba(255,255,255,.12); font-size:0.9rem; }
  .art .body .row:first-child { margin-top:12px; }
  .art .row .l { color:var(--dim); white-space:nowrap; }
  .art .row .v { font-family:var(--mono); font-weight:500; font-variant-numeric:tabular-nums; text-align:right; }
  .art .news { font-size:1.05rem; font-weight:500; line-height:1.5; margin:14px 0 6px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .art .sub { color:var(--dim); font-size:0.82rem; font-family:var(--mono); letter-spacing:0.02em; }
  .art .upd { color:var(--faint); font-size:0.72rem; font-family:var(--mono); margin-top:16px; letter-spacing:0.05em; }
  .art .loading { color:var(--dim); font-size:0.86rem; margin-top:12px; }
  .up { color:var(--up); } .down { color:var(--down); } .dim { color:var(--dim); }

  footer { margin-top:40px; padding-top:20px; border-top:1px solid rgba(255,255,255,.08);
    text-align:center; color:var(--faint); font-size:0.78rem; line-height:1.9;
    font-family:var(--mono); letter-spacing:0.02em; }

  @media (max-width:720px) { .lead.show { grid-template-columns:1fr; gap:24px; } .grid { gap:0 24px; } }
  @media (prefers-reduced-motion:reduce) { * { transition:none !important; } }
</style>
