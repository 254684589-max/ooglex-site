<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Ooglex">
  <defs>
    <linearGradient id="ogB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/><stop offset=".28" stop-color="#4aa8ff"/>
      <stop offset=".52" stop-color="#6c8cff"/><stop offset=".76" stop-color="#c86cff"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="ogP" cx=".35" cy=".28" r=".95">
      <stop offset="0" stop-color="#9ff3ff"/><stop offset=".38" stop-color="#6c8cff"/>
      <stop offset=".72" stop-color="#9d4be0"/><stop offset="1" stop-color="#3a1a5c"/>
    </radialGradient>
    <radialGradient id="ogBg" cx=".36" cy=".30" r="1">
      <stop offset="0" stop-color="#232c50"/><stop offset=".55" stop-color="#131a33"/><stop offset="1" stop-color="#090d1e"/>
    </radialGradient>
    <filter id="ogG" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="120" height="120" fill="url(#ogBg)"/>

  <!-- 背环 -->
  <g transform="rotate(-24 60 60)">
    <ellipse cx="60" cy="60" rx="50" ry="15" fill="none" stroke="url(#ogB)" stroke-width="5.5" stroke-opacity=".5"/>
  </g>
  <!-- 行星 -->
  <g filter="url(#ogG)">
    <circle cx="60" cy="60" r="27" fill="url(#ogP)"/>
    <ellipse cx="50" cy="48" rx="10" ry="6" fill="#ffffff" opacity=".3"/>
    <circle cx="60" cy="60" r="27" fill="none" stroke="#ffffff" stroke-opacity=".18" stroke-width="1.3"/>
  </g>
  <!-- 前环（下半，压在行星前面） -->
  <g transform="rotate(-24 60 60)">
    <path d="M10,60 A50,15 0 0 0 110,60" fill="none" stroke="url(#ogB)" stroke-width="5.5" stroke-linecap="round"/>
  </g>
  <!-- 星光 -->
  <circle cx="99" cy="27" r="2" fill="#ffffff"/>
  <circle cx="23" cy="92" r="1.6" fill="#cfe0ff"/>
  <circle cx="94" cy="97" r="1.4" fill="#f0abfc"/>
</svg>
